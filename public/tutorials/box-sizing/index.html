document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;

      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');

      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }

border-left-color: var(--blue); }\n  .model-card h3{\n    font-family: var(--font-mono);\n    font-size: 13px;\n    letter-spacing: 0.05em;\n    text-transform: uppercase;\n    margin: 0 0 var(--sp-1);\n    color: var(--fg1);\n  }\n  .model-card.red h3 .v{ color: var(--red); }\n  .model-card.blue h3 .v{ color: var(--blue); }\n  .model-card .rule{\n    font-size: 13px;\n    color: var(--fg2);\n    margin: 0 0 var(--sp-4);\n    min-height: 38px;\n  }\n\n  /* diagram */\n  .diagram-wrap{\n    display:flex;\n    justify-content:center;\n    padding: var(--sp-4) 0 var(--sp-2);\n  }\n  .diagram{\n    position: relative;\n    transition: width .2s ease, padding .2s ease, border-width .2s ease;\n    font-family: var(--font-mono);\n    font-size: 12px;\n    text-align:center;\n  }\n  .diagram .content-label{\n    display:block;\n    padding: 18px 10px;\n    background: #F2D272;\n    color: #393E41;\n    font-weight: 600;\n  }\n  .diagram.cb{\n    box-sizing: content-box;\n    background: transparent;\n    border-style: solid;\n    border-color: var(--red);\n  }\n  .diagram.bb{\n    box-sizing: border-box;\n    background: transparent;\n    border-style: solid;\n    border-color: var(--blue);\n  }\n  .diagram.cb{ background-color: var(--red-subtle); }\n  .diagram.bb{ background-color: var(--blue-subtle); }\n\n  .total-bar{\n    margin-top: var(--sp-4);\n    height: 22px;\n    position: relative;\n    background: var(--bg-subtle);\n    border-radius: 3px;\n    overflow: hidden;\n  }\n  .total-bar .fill{\n    position:absolute; top:0; left:0; bottom:0;\n    transition: width .2s ease, background .2s ease;\n  }\n  .total-bar .fill.red{ background: var(--red); }\n  .total-bar .fill.blue{ background: var(--blue); }\n  .total-bar .tick{\n    position:absolute; top:-4px; bottom:-4px;\n    border-left: 1px dashed var(--fg3);\n  }\n  .bar-row{\n    display:flex;\n    justify-content: space-between;\n    font-family: var(--font-mono);\n    font-size: 11px;\n    color: var(--fg2);\n    margin-top: 6px;\n  }\n\n  .math{\n    margin-top: var(--sp-4);\n    font-family: var(--font-mono);\n    font-size: 14px;\n    color: var(--fg1);\n    background: var(--bg-subtle);\n    padding: var(--sp-3) var(--sp-4);\n    border-radius: 6px;\n    line-height: 1.7;\n  }\n  .math .op{ color: var(--fg3); margin: 0 4px; }\n  .math .r{ color: var(--red); }\n  .math .b{ color: var(--blue); }\n  .math .tag{\n    font-family: var(--font-mono);\n    font-size: 11px;\n    text-transform: uppercase;\n    letter-spacing: 0.06em;\n    color: var(--fg3);\n    display:block;\n    margin-bottom: 4px;\n  }\n\n  /* sliders */\n  .controls{\n    background: var(--bg-card);\n    border: 1px solid var(--border);\n    border-radius: 6px;\n    padding: var(--sp-5);\n  }\n  .controls h3{\n    font-family: var(--font-mono);\n    font-size: 12px;\n    letter-spacing: 0.06em;\n    text-transform: uppercase;\n    margin: 0 0 var(--sp-4);\n    color: var(--fg2);\n  }\n  .slider-row{\n    display:grid;\n    grid-template-columns: 100px 1fr 64px;\n    align-items: center;\n    gap: var(--sp-4);\n    margin-bottom: var(--sp-3);\n  }\n  .slider-row label{\n    font-family: var(--font-mono);\n    font-size: 13px;\n    color: var(--fg1);\n  }\n  .slider-row .val{\n    font-family: var(--font-mono);\n    font-size: 13px;\n    color: var(--fg1);\n    text-align: right;\n    font-weight: 600;\n  }\n  input[type=\"range\"]{\n    -webkit-appearance: none;\n    appearance: none;\n    width: 100%;\n    background: transparent;\n  }\n  input[type=\"range\"]::-webkit-slider-runnable-track{\n    height: 4px;\n    background: var(--bg-subtle);\n    border-radius: 2px;\n  }\n  input[type=\"range\"]::-moz-range-track{\n    height: 4px;\n    background: var(--bg-subtle);\n    border-radius: 2px;\n  }\n  input[type=\"range\"]::-webkit-slider-thumb{\n    -webkit-appearance: none;\n    appearance: none;\n    width: 16px; height: 16px;\n    border-radius: 50%;\n    background: var(--fg1);\n    border: 2px solid var(--bg);\n    margin-top: -6px;\n    cursor: pointer;\n  }\n  input[type=\"range\"]::-moz-range-thumb{\n    width: 14px; height: 14px;\n    border-radius: 50%;\n    background: var(--fg1);\n    border: 2px solid var(--bg);\n    cursor: pointer;\n  }\n  input[type=\"range\"]:focus-visible{\n    outline: 2px solid var(--red);\n    outline-offset: 4px;\n    border-radius: 2px;\n  }\n\n  /* ---------- Section 3 — the fix ---------- */\n  .fix-grid{\n    display:grid;\n    grid-template-columns: 1.1fr 1fr;\n    gap: var(--sp-5);\n    align-items: start;\n  }\n  @media (max-width: 820px){ .fix-grid{ grid-template-columns: 1fr; } }\n\n  pre.code{\n    background: var(--bg-card);\n    border: 1px solid var(--border);\n    border-radius: 6px;\n    padding: var(--sp-5);\n    margin: 0;\n    font-family: var(--font-mono);\n    font-size: 14px;\n    line-height: 1.7;\n    color: var(--fg1);\n    overflow-x: auto;\n  }\n  pre.code .c{ color: var(--fg3); }\n  pre.code .sel{ color: var(--red); }\n  pre.code .prop{ color: var(--blue); }\n  pre.code .val{ color: var(--green); }\n\n  .note{\n    background: var(--bg-card);\n    border: 1px solid var(--border);\n    border-left: 6px solid var(--blue);\n    padding: var(--sp-5);\n  }\n  .note .tag{\n    font-family: var(--font-mono);\n    font-size: 12px;\n    letter-spacing: 0.08em;\n    text-transform: uppercase;\n    color: var(--blue);\n    margin-bottom: var(--sp-2);\n  }\n  .note p{\n    margin: 0;\n    font-size: 15px;\n    color: var(--fg1);\n    line-height: 1.7;\n  }\n\n  footer.page{\n    padding: var(--sp-6) 0 var(--sp-8);\n    color: var(--fg3);\n    font-family: var(--font-mono);\n    font-size: 12px;\n    letter-spacing: 0.05em;\n    text-transform: uppercase;\n    text-align: center;\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n<header class=\"page\">\n  <div class=\"inner\">\n    <span class=\"badge\">DESN 368<\u002Fspan>\n    <h1>box-sizing <span class=\"mono\">· the one property that fixes CSS layout<\u002Fspan><\u002Fh1>\n    <p class=\"sub\">Three short interactions. You'll watch the bug happen, understand why it happens, then write one line that fixes it everywhere.<\u002Fp>\n    <div class=\"meta\">\n      <span>Week 5<\u002Fspan><span>CSS Box Model<\u002Fspan><span>~3 min<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<!-- ========== 1. THE SURPRISE ========== -->\n<section class=\"lesson\">\n  <div class=\"wrap\">\n    <p class=\"section-label\"><span class=\"num\">1<\u002Fspan>The surprise<\u002Fp>\n    <h2>Two boxes. Both <span class=\"mono\">width: 300px<\u002Fspan>.<\u002Fh2>\n    <p class=\"lead\">Click the button. Watch what happens.<\u002Fp>\n\n    <div class=\"stage\" id=\"stage1\" data-toggled=\"false\">\n      <div class=\"boxes\">\n        <div class=\"box-col\">\n          <div class=\"box-label\"><span class=\"model-red\">content-box<\u002Fspan> (default)<\u002Fdiv>\n          <div class=\"rail\">\n            <div class=\"demo content-box\" id=\"cbDemo\">width: 300px<\u002Fdiv>\n            <div class=\"overflow-mark\">↑ overflowed the 300px target<\u002Fdiv>\n            <div class=\"ruler\">\n              <div class=\"target\"><\u002Fdiv>\n              <div class=\"target-label\">300px target<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"measurement\">rendered: <span class=\"px\" id=\"cbPx\">300px<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"box-col\">\n          <div class=\"box-label\"><span class=\"model-blue\">border-box<\u002Fspan><\u002Fdiv>\n          <div class=\"rail\">\n            <div class=\"demo border-box\" id=\"bbDemo\">width: 300px<\u002Fdiv>\n            <div class=\"overflow-mark\" style=\"visibility:hidden\">placeholder<\u002Fdiv>\n            <div class=\"ruler\">\n              <div class=\"target\"><\u002Fdiv>\n              <div class=\"target-label\">300px target<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"measurement\">rendered: <span class=\"px\" id=\"bbPx\">300px<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"toggle-row\">\n        <button class=\"primary\" id=\"toggleBtn\">Add 20px padding + 10px border<\u002Fbutton>\n        <span class=\"status-hint\" id=\"statusHint\">both still 300px · untouched<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ========== 2. THE WHY ========== -->\n<section class=\"lesson\">\n  <div class=\"wrap\">\n    <p class=\"section-label\"><span class=\"num\">2<\u002Fspan>The why<\u002Fp>\n    <h2>Where does <span class=\"mono\">width<\u002Fspan> actually apply?<\u002Fh2>\n    <p class=\"lead\">Drag the sliders. Watch the total rendered width update on both sides.<\u002Fp>\n\n    <div class=\"why-grid\">\n      <div class=\"model-card red\">\n        <h3><span class=\"v\">content-box<\u002Fspan> · default<\u002Fh3>\n        <p class=\"rule\">width = content only. Padding and border add on top.<\u002Fp>\n\n        <div class=\"diagram-wrap\">\n          <div class=\"diagram cb\" id=\"cbDiag\">\n            <span class=\"content-label\">content · 300px<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"total-bar\" id=\"cbBar\">\n          <div class=\"fill red\" id=\"cbFill\"><\u002Fdiv>\n          <div class=\"tick\" id=\"cbTick\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"bar-row\"><span>0<\u002Fspan><span id=\"cbBarMax\">500px<\u002Fspan><\u002Fdiv>\n\n        <div class=\"math\">\n          <span class=\"tag\">rendered width<\u002Fspan>\n          <span>300<\u002Fspan><span class=\"op\">+<\u002Fspan><span class=\"r\" id=\"cbPad\">40<\u002Fspan><span class=\"op\">+<\u002Fspan><span class=\"r\" id=\"cbBor\">20<\u002Fspan><span class=\"op\">=<\u002Fspan><strong class=\"r\" id=\"cbTotal\">360px<\u002Fstrong>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"model-card blue\">\n        <h3><span class=\"v\">border-box<\u002Fspan><\u002Fh3>\n        <p class=\"rule\">width = content + padding + border. Padding eats into content.<\u002Fp>\n\n        <div class=\"diagram-wrap\">\n          <div class=\"diagram bb\" id=\"bbDiag\">\n            <span class=\"content-label\" id=\"bbContentLabel\">content · 240px<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"total-bar\" id=\"bbBar\">\n          <div class=\"fill blue\" id=\"bbFill\"><\u002Fdiv>\n          <div class=\"tick\" id=\"bbTick\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"bar-row\"><span>0<\u002Fspan><span id=\"bbBarMax\">500px<\u002Fspan><\u002Fdiv>\n\n        <div class=\"math\">\n          <span class=\"tag\">rendered width<\u002Fspan>\n          <strong class=\"b\" id=\"bbTotal\">300px<\u002Fstrong><span class=\"op\">·<\u002Fspan><span style=\"color:var(--fg3)\">always<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"controls\">\n      <h3>Tweak the values<\u002Fh3>\n      <div class=\"slider-row\">\n        <label for=\"padInput\">padding<\u002Flabel>\n        <input type=\"range\" id=\"padInput\" min=\"0\" max=\"60\" value=\"20\" step=\"1\">\n        <span class=\"val\"><span id=\"padVal\">20<\u002Fspan>px<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"slider-row\">\n        <label for=\"borInput\">border<\u002Flabel>\n        <input type=\"range\" id=\"borInput\" min=\"0\" max=\"30\" value=\"10\" step=\"1\">\n        <span class=\"val\"><span id=\"borVal\">10<\u002Fspan>px<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ========== 3. THE FIX ========== -->\n<section class=\"lesson\">\n  <div class=\"wrap\">\n    <p class=\"section-label\"><span class=\"num\">3<\u002Fspan>The fix<\u002Fp>\n    <h2>One reset. Every stylesheet. Every time.<\u002Fh2>\n    <p class=\"lead\">Put this at the top of your CSS. You'll never calculate overflow math again.<\u002Fp>\n\n    <div class=\"fix-grid\">\n<pre class=\"code\"><span class=\"c\">/* The universal reset — first rule in every stylesheet */<\u002Fspan>\n<span class=\"sel\">*<\u002Fspan> {\n  <span class=\"prop\">box-sizing<\u002Fspan>: <span class=\"val\">border-box<\u002Fspan>;\n}<\u002Fpre>\n\n      <div class=\"note\">\n        <div class=\"tag\">Why isn't this the default?<\u002Fdiv>\n        <p>When CSS shipped in 1996, <span style=\"color:var(--red)\">content-box<\u002Fspan> was the spec. Millions of sites were built against it. Browsers can't change the default now — older layouts would break overnight. So the standard stays, and we opt in at the top of every stylesheet ourselves.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<footer class=\"page\">DESN 368 · Web Design Fundamentals · Spring 2026<\u002Ffooter>\n\n<script>\n  // ---------- Section 1: the surprise ----------\n  const stage1 = document.getElementById('stage1');\n  const toggleBtn = document.getElementById('toggleBtn');\n  const statusHint = document.getElementById('statusHint');\n  const cbPx = document.getElementById('cbPx');\n  const bbPx = document.getElementById('bbPx');\n  const cbDemo = document.getElementById('cbDemo');\n  const bbDemo = document.getElementById('bbDemo');\n\n  function measure(){\n    cbPx.textContent = cbDemo.offsetWidth + 'px';\n    bbPx.textContent = bbDemo.offsetWidth + 'px';\n    const toggled = stage1.dataset.toggled === 'true';\n    cbPx.classList.toggle('bad', toggled);\n    bbPx.classList.toggle('good', toggled);\n  }\n  measure();\n\n  toggleBtn.addEventListener('click', () => {\n    const on = stage1.dataset.toggled === 'true';\n    stage1.dataset.toggled = on ? 'false' : 'true';\n    toggleBtn.textContent = on\n      ? 'Add 20px padding + 10px border'\n      : 'Reset';\n    statusHint.textContent = on\n      ? 'both still 300px · untouched'\n      : 'same width property · different results';\n    // wait for transition to finish before measuring final values\n    setTimeout(measure, 400);\n    // but also measure immediately for snappy reset\n    requestAnimationFrame(measure);\n  });\n  window.addEventListener('resize', measure);\n\n  // ---------- Section 2: the why ----------\n  const padInput = document.getElementById('padInput');\n  const borInput = document.getElementById('borInput');\n  const padVal = document.getElementById('padVal');\n  const borVal = document.getElementById('borVal');\n\n  const cbDiag = document.getElementById('cbDiag');\n  const bbDiag = document.getElementById('bbDiag');\n  const bbContentLabel = document.getElementById('bbContentLabel');\n\n  const cbPad = document.getElementById('cbPad');\n  const cbBor = document.getElementById('cbBor');\n  const cbTotal = document.getElementById('cbTotal');\n  const bbTotal = document.getElementById('bbTotal');\n\n  const cbFill = document.getElementById('cbFill');\n  const bbFill = document.getElementById('bbFill');\n  const cbTick = document.getElementById('cbTick');\n  const bbTick = document.getElementById('bbTick');\n\n  const CONTENT = 300;\n  const BAR_MAX = 500;\n\n  function update(){\n    const p = +padInput.value;\n    const b = +borInput.value;\n    padVal.textContent = p;\n    borVal.textContent = b;\n\n    // content-box diagram: grows with padding + border\n    cbDiag.style.width = CONTENT + 'px';\n    cbDiag.style.padding = p + 'px';\n    cbDiag.style.borderWidth = b + 'px';\n\n    // border-box diagram: total stays 300, inner shrinks\n    bbDiag.style.width = CONTENT + 'px';\n    bbDiag.style.padding = p + 'px';\n    bbDiag.style.borderWidth = b + 'px';\n\n    const cbTotalPx = CONTENT + (p * 2) + (b * 2);\n    const bbTotalPx = CONTENT;\n    const bbInner = Math.max(0, CONTENT - (p * 2) - (b * 2));\n\n    // math display\n    cbPad.textContent = p * 2;\n    cbBor.textContent = b * 2;\n    cbTotal.textContent = cbTotalPx + 'px';\n    bbTotal.textContent = bbTotalPx + 'px';\n    bbContentLabel.textContent = 'content · ' + bbInner + 'px';\n\n    // bars\n    const cbPct = Math.min(100, (cbTotalPx / BAR_MAX) * 100);\n    const bbPct = (bbTotalPx / BAR_MAX) * 100;\n    cbFill.style.width = cbPct + '%';\n    bbFill.style.width = bbPct + '%';\n\n    // 300px reference ticks\n    const tickPct = (CONTENT / BAR_MAX) * 100;\n    cbTick.style.left = tickPct + '%';\n    bbTick.style.left = tickPct + '%';\n  }\n\n  padInput.addEventListener('input', update);\n  borInput.addEventListener('input', update);\n  update();\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
