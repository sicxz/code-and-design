document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

.04);\n  }\n\n  * { box-sizing: border-box; }\n  html, body { margin: 0; }\n\n  body {\n    background: var(--bg-page);\n    color: var(--fg1);\n    font-family: var(--font-sans);\n    font-size: 16px;\n    line-height: 1.7;\n  }\n\n  .shell {\n    display: grid;\n    grid-template-columns: minmax(0, 1fr) 340px;\n    gap: 24px;\n    max-width: 1280px;\n    margin: 0 auto;\n    padding: 32px;\n    align-items: start;\n  }\n\n  .col-page { min-width: 0; }\n\n  /* ============================================================\n     COURSE HEADER\n     ============================================================ */\n  .course-header {\n    background: var(--bg);\n    border: 1px solid var(--border);\n    border-top: 4px solid var(--eagle-red);\n    border-radius: var(--radius-md);\n    padding: 32px;\n    margin-bottom: 24px;\n    box-shadow: var(--shadow-card);\n  }\n  .badge {\n    display: inline-block;\n    font-family: var(--font-mono);\n    font-size: 12px;\n    font-weight: 600;\n    letter-spacing: 0.05em;\n    text-transform: uppercase;\n    padding: 4px 12px;\n    background: var(--eagle-red);\n    color: #fff;\n    border-radius: var(--radius-pill);\n    margin-bottom: 12px;\n  }\n  .badge--ghost {\n    background: transparent;\n    color: var(--eagle-red-text);\n    border: 1px solid var(--eagle-red);\n    padding: 3px 10px;\n    margin-bottom: 0;\n  }\n  .course-title {\n    font-size: 32px;\n    font-weight: 800;\n    line-height: 1.2;\n    letter-spacing: -0.02em;\n    margin: 0;\n    color: var(--fg1);\n  }\n  .course-sub {\n    font-family: var(--font-mono);\n    font-size: 12px;\n    font-weight: 500;\n    color: var(--fg2);\n    margin-top: 8px;\n  }\n  .hr-subtle { height: 1px; background: var(--border-light); margin: 16px 0; }\n  .meta-row {\n    display: flex; gap: 16px; flex-wrap: wrap; align-items: center;\n  }\n  .meta-row .meta {\n    font-family: var(--font-mono);\n    font-size: 12px;\n    font-weight: 500;\n    color: var(--fg2);\n  }\n\n  /* ============================================================\n     SECTION CARDS (square corners + colored left accent)\n     ============================================================ */\n  .card {\n    background: var(--bg);\n    border: 1px solid var(--border-light);\n    border-radius: 0;\n    padding: 24px 28px;\n    margin-bottom: 16px;\n  }\n  .card--red    { border-left: 6px solid var(--eagle-red); }\n  .card--blue   { border-left: 6px solid var(--eagle-blue-text); }\n  .card--green  { border-left: 6px solid var(--eagle-green-text); }\n  .card--neutral{ border-radius: var(--radius-md); }\n\n  .card h2 {\n    font-size: 22px;\n    font-weight: 700;\n    line-height: 1.3;\n    letter-spacing: -0.01em;\n    color: var(--fg1);\n    margin: 0 0 16px 0;\n  }\n  .card h3 {\n    font-size: 18px;\n    font-weight: 600;\n    line-height: 1.3;\n    color: var(--fg1);\n    margin: 20px 0 12px 0;\n  }\n  .card p {\n    font-size: 16px;\n    line-height: 1.7;\n    color: var(--fg1);\n    margin: 0 0 16px 0;\n  }\n  .card p:last-child { margin-bottom: 0; }\n\n  /* Banners (note / important / success / warning) */\n  .banner {\n    border: 1px solid var(--border-light);\n    border-left: 6px solid var(--fg1);\n    padding: 14px 18px;\n    margin: 16px 0;\n  }\n  .banner--note     { background: var(--eagle-blue-subtle); border-color: var(--eagle-blue-border); border-left-color: var(--eagle-blue-text); }\n  .banner--imp      { background: var(--eagle-red-subtle);  border-color: var(--eagle-red-border);  border-left-color: var(--eagle-red); }\n  .banner--success  { background: var(--eagle-green-subtle);border-color: var(--eagle-green-border);border-left-color: var(--eagle-green-text); }\n  .banner--warn     { background: var(--warning-subtle);    border-color: var(--warning-border);    border-left-color: var(--warning); }\n  .banner__label {\n    font-family: var(--font-mono);\n    font-size: 12px;\n    font-weight: 600;\n    letter-spacing: 0.06em;\n    text-transform: uppercase;\n    margin-bottom: 4px;\n  }\n  .banner--note    .banner__label { color: var(--eagle-blue-text); }\n  .banner--imp     .banner__label { color: var(--eagle-red-text); }\n  .banner--success .banner__label { color: var(--eagle-green-text); }\n  .banner--warn    .banner__label { color: var(--warning); }\n  .banner p { font-size: 14px; line-height: 1.5; margin: 0; }\n\n  code, .code {\n    font-family: var(--font-mono);\n    font-size: 14px;\n    background: var(--bg-surface);\n    padding: 2px 6px;\n    border-radius: 3px;\n    color: var(--eagle-red-text);\n  }\n\n  em { font-style: italic; }\n\n  /* Story-specific nested demonstration boxes (these are inspectable) */\n  .nested-box {\n    padding: 12px 18px;\n    margin: 12px 8px;\n    border: 1px dashed var(--border);\n    background: var(--bg-subtle);\n  }\n  .nested-box .nested-box {\n    border-style: dotted;\n    background: var(--bg);\n  }\n  .word-box {\n    display: inline-block;\n    margin: 2px 3px;\n    padding: 2px 6px;\n    border: 1px solid var(--border-light);\n    background: var(--bg);\n    font-family: var(--font-mono);\n    font-size: 13px;\n  }\n\n  /* Footer quote (from styleguide) */\n  .pullquote {\n    background: var(--eagle-red-subtle);\n    border: 1px solid var(--eagle-red-border);\n    border-left: 6px solid var(--eagle-red);\n    padding: 16px 20px;\n    border-radius: 0;\n  }\n  .pullquote p {\n    font-style: italic;\n    font-size: 16px;\n    line-height: 1.7;\n    margin: 0;\n    color: var(--fg1);\n  }\n  .pullquote cite {\n    display: block;\n    margin-top: 8px;\n    font-family: var(--font-mono);\n    font-size: 12px;\n    font-weight: 500;\n    color: var(--fg2);\n    font-style: normal;\n  }\n\n  /* ============================================================\n     INSPECTOR (right rail, DESN 368 neutral card)\n     ============================================================ */\n  .inspector {\n    position: sticky;\n    top: 32px;\n    background: var(--bg);\n    border: 1px solid var(--border);\n    border-radius: var(--radius-md);\n    box-shadow: var(--shadow-card);\n    font-family: var(--font-sans);\n    color: var(--fg1);\n    overflow: hidden;\n    max-height: calc(100vh - 64px);\n    display: flex;\n    flex-direction: column;\n  }\n\n  .inspector__head {\n    background: var(--bg);\n    border-bottom: 1px solid var(--border-light);\n    padding: 16px 20px;\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n    gap: 12px;\n  }\n  .inspector__head .title {\n    font-family: var(--font-mono);\n    font-size: 12px;\n    font-weight: 600;\n    letter-spacing: 0.06em;\n    text-transform: uppercase;\n    color: var(--fg1);\n  }\n  .inspector__head .pill {\n    font-family: var(--font-mono);\n    font-size: 10px;\n    font-weight: 600;\n    letter-spacing: 0.05em;\n    text-transform: uppercase;\n    padding: 2px 10px;\n    border-radius: var(--radius-pill);\n    background: var(--eagle-red);\n    color: #fff;\n  }\n\n  .inspector__body {\n    overflow: auto;\n  }\n\n  .inspector__section {\n    padding: 16px 20px;\n    border-bottom: 1px solid var(--border-light);\n  }\n  .inspector__section:last-child { border-bottom: 0; }\n\n  .label {\n    font-family: var(--font-mono);\n    font-size: 12px;\n    font-weight: 600;\n    letter-spacing: 0.06em;\n    text-transform: uppercase;\n    color: var(--fg2);\n    margin-bottom: 10px;\n  }\n\n  .layer-row {\n    display: grid;\n    grid-template-columns: 16px 14px 1fr auto;\n    align-items: center;\n    gap: 10px;\n    padding: 6px 0;\n    cursor: pointer;\n    user-select: none;\n    font-size: 14px;\n    color: var(--fg1);\n  }\n  .layer-row input[type=\"checkbox\"] {\n    margin: 0;\n    width: 14px; height: 14px;\n    accent-color: var(--eagle-red);\n  }\n  .layer-row .swatch {\n    width: 14px; height: 14px;\n    border: 1px solid var(--border);\n    border-radius: 2px;\n  }\n  .layer-row .key {\n    font-family: var(--font-mono);\n    font-size: 10px;\n    letter-spacing: 0.05em;\n    text-transform: uppercase;\n    color: var(--fg2);\n  }\n\n  .ctrl-row {\n    display: flex;\n    align-items: center;\n    gap: 10px;\n    padding: 4px 0;\n    font-size: 14px;\n    color: var(--fg1);\n    cursor: pointer;\n  }\n  .ctrl-row input[type=\"checkbox\"] { accent-color: var(--eagle-red); }\n\n  .btn-row {\n    display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap;\n  }\n  .btn {\n    font-family: var(--font-sans);\n    font-size: 14px;\n    font-weight: 600;\n    padding: 8px 14px;\n    border-radius: var(--radius-md);\n    border: 1px solid var(--eagle-red);\n    background: transparent;\n    color: var(--eagle-red-text);\n    cursor: pointer;\n    line-height: 1;\n  }\n  .btn:hover { background: var(--eagle-red-light); }\n  .btn--blue { border-color: var(--eagle-blue-text); color: var(--eagle-blue-text); }\n  .btn--blue:hover { background: rgba(1,186,239,0.10); }\n  .btn--filled { background: var(--eagle-red); color: #fff; }\n  .btn--filled:hover { background: #9A1125; }\n\n  .btn:focus-visible, .ctrl-row input:focus-visible, .layer-row input:focus-visible {\n    outline: 2px solid var(--eagle-red);\n    outline-offset: 2px;\n  }\n\n  /* Selection readout */\n  .sel-tag {\n    display: inline-block;\n    font-family: var(--font-mono);\n    font-size: 11px;\n    font-weight: 600;\n    letter-spacing: 0.05em;\n    padding: 3px 10px;\n    border-radius: var(--radius-pill);\n    background: var(--fg1);\n    color: #fff;\n  }\n  .sel-tag--empty { background: transparent; color: var(--fg3); border: 1px dashed var(--border); }\n\n  .dim-grid {\n    margin-top: 10px;\n    display: grid;\n    grid-template-columns: auto 1fr;\n    gap: 4px 12px;\n    font-family: var(--font-mono);\n    font-size: 12px;\n  }\n  .dim-grid .k { color: var(--fg2); }\n  .dim-grid .v { color: var(--fg1); font-weight: 600; }\n\n  /* Box-model diagram */\n  .bm {\n    margin-top: 14px;\n    position: relative;\n    width: 100%;\n    aspect-ratio: 16/9;\n    font-family: var(--font-mono);\n    font-size: 10px;\n    color: var(--fg1);\n    border: 1px solid var(--border-light);\n    background: var(--bg-subtle);\n  }\n  .bm__layer {\n    position: absolute;\n    border: 1px solid rgba(0,0,0,0.18);\n    display: flex; align-items: center; justify-content: center;\n  }\n  .bm__margin  { inset: 0;   background: var(--bm-margin); }\n  .bm__border  { inset: 14%; background: var(--bm-border); }\n  .bm__padding { inset: 28%; background: var(--bm-padding); }\n  .bm__content { inset: 44%; background: var(--bm-content); }\n  .bm__tag {\n    position: absolute;\n    font-family: var(--font-mono);\n    font-size: 9px;\n    letter-spacing: 0.04em;\n    text-transform: uppercase;\n    color: var(--fg2);\n    background: rgba(253,255,252,0.9);\n    padding: 1px 5px;\n    border-radius: 2px;\n  }\n  .bm__edge {\n    position: absolute;\n    font-family: var(--font-mono);\n    font-size: 10px;\n    font-weight: 600;\n    color: var(--fg1);\n    background: rgba(253,255,252,0.85);\n    padding: 0 3px;\n  }\n\n  /* Alignment notes */\n  .notes .row {\n    display: grid;\n    grid-template-columns: auto 1fr auto;\n    align-items: start;\n    gap: 8px;\n    padding: 8px 0;\n    border-bottom: 1px solid var(--border-light);\n  }\n  .notes .row:last-child { border-bottom: 0; }\n  .notes .pill-s {\n    font-family: var(--font-mono);\n    font-size: 9px;\n    font-weight: 600;\n    letter-spacing: 0.06em;\n    text-transform: uppercase;\n    padding: 2px 8px;\n    border-radius: var(--radius-pill);\n    color: #fff;\n    white-space: nowrap;\n  }\n  .notes .pill-s--ok   { background: var(--eagle-green-text); }\n  .notes .pill-s--warn { background: var(--warning); }\n  .notes .pill-s--bad  { background: var(--eagle-red); }\n  .notes .pill-s--info { background: var(--eagle-blue-text); }\n  .notes .msg { font-size: 13px; color: var(--fg1); line-height: 1.4; }\n  .notes .val {\n    font-family: var(--font-mono);\n    font-size: 11px;\n    color: var(--fg1);\n    white-space: nowrap;\n  }\n\n  /* ============================================================\n     Overlays drawn on elements\n     ============================================================ */\n  #overlays {\n    position: absolute;\n    inset: 0;\n    pointer-events: none;\n    z-index: 40;\n  }\n  .bm-overlay {\n    position: absolute;\n    pointer-events: none;\n    box-sizing: border-box;\n  }\n  .bm-overlay--margin  { background: var(--bm-margin); }\n  .bm-overlay--border  { background: var(--bm-border); }\n  .bm-overlay--padding { background: var(--bm-padding); }\n  .bm-overlay--content { background: var(--bm-content); }\n\n  .bm-dim {\n    position: absolute;\n    font-family: var(--font-mono);\n    font-size: 10px;\n    font-weight: 600;\n    background: var(--fg1);\n    color: #fff;\n    padding: 2px 6px;\n    border-radius: 3px;\n    white-space: nowrap;\n    z-index: 60;\n  }\n  .bm-dim--content { background: var(--eagle-blue-text); }\n\n  .guide {\n    position: absolute;\n    pointer-events: none;\n    z-index: 55;\n  }\n  .guide--v { width: 0; border-left: 1px dashed var(--eagle-red); top: 0; height: 100%; }\n  .guide--h { height: 0; border-top: 1px dashed var(--eagle-red); left: 0; width: 100%; }\n  .guide__label {\n    position: absolute;\n    background: var(--eagle-red);\n    color: #fff;\n    font-family: var(--font-mono);\n    font-size: 9px;\n    font-weight: 600;\n    letter-spacing: 0.04em;\n    padding: 1px 5px;\n    border-radius: 2px;\n  }\n\n  .halo {\n    position: absolute;\n    pointer-events: none;\n    outline: 2px solid var(--eagle-red);\n    z-index: 70;\n  }\n  .halo-tag {\n    position: absolute;\n    background: var(--eagle-red);\n    color: #fff;\n    font-family: var(--font-mono);\n    font-size: 10px;\n    font-weight: 600;\n    letter-spacing: 0.04em;\n    padding: 2px 7px;\n    border-radius: 3px;\n    z-index: 71;\n    white-space: nowrap;\n  }\n\n  /* ============================================================\n     RESPONSIVE\n     ============================================================ */\n  @media (max-width: 1040px) {\n    .shell { grid-template-columns: 1fr; }\n    .inspector { position: static; max-height: none; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div class=\"shell\">\n  <main class=\"col-page\" id=\"page-root\">\n\n    <!-- Course Header -->\n    <div class=\"course-header\" data-inspect=\"\">\n      <span class=\"badge\">DESN 368<\u002Fspan>\n      <h1 class=\"course-title\" data-inspect=\"\">The Story of the Box<\u002Fh1>\n      <p class=\"course-sub\">Web Design Fundamentals · Spring 2026 · Week 5 · Reading<\u002Fp>\n      <div class=\"hr-subtle\"><\u002Fdiv>\n      <div class=\"meta-row\">\n        <span class=\"meta\">Topic: CSS Box Model<\u002Fspan>\n        <span class=\"meta\">Est. read: 8 min<\u002Fspan>\n        <span class=\"meta\">Format: Interactive<\u002Fspan>\n        <span class=\"badge badge--ghost\">Active<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Section 1: Overview (red) -->\n    <section class=\"card card--red\" data-inspect=\"\">\n      <h2 data-inspect=\"\">Part one — the four parts of a box<\u002Fh2>\n      <p data-inspect=\"\">There was once a box. The box had something inside it, which we will call its <em>content<\u002Fem>. The content sat quietly at the center, minding its own business.<\u002Fp>\n      <p data-inspect=\"\">But the content was lonely, so the box gave it some breathing room. This breathing room was called <em>padding<\u002Fem>, a soft cushion between the content and the walls of the box.<\u002Fp>\n      <p data-inspect=\"\">The box had walls, too. The walls were called the <em>border<\u002Fem>. They were firm and drawn, visible to anyone who looked.<\u002Fp>\n      <p data-inspect=\"\">Outside the walls, the box wanted space from its neighbors. This outer space was called <em>margin<\u002Fem>, an invisible force field that kept other boxes from crowding in.<\u002Fp>\n      <p data-inspect=\"\">So every box had four parts: <code>content<\u002Fcode>, <code>padding<\u002Fcode>, <code>border<\u002Fcode>, <code>margin<\u002Fcode>. This is the box model, and every element on every webpage is built this way.<\u002Fp>\n    <\u002Fsection>\n\n    <!-- Section 2: Nesting (blue — info) -->\n    <section class=\"card card--blue\" data-inspect=\"\">\n      <h2 data-inspect=\"\">Part two — the box contains itself<\u002Fh2>\n      <p data-inspect=\"\">Now imagine the story itself is a box.<\u002Fp>\n\n      <div class=\"nested-box\" data-inspect=\"\">\n        <p data-inspect=\"\">The paragraphs you are reading are the <em>content<\u002Fem>.<\u002Fp>\n        <div class=\"nested-box\" data-inspect=\"\">\n          <p data-inspect=\"\">The indentation and line-height are the <em>padding<\u002Fem>.<\u002Fp>\n          <div class=\"nested-box\" data-inspect=\"\">\n            <p data-inspect=\"\">The edge of the page where the text ends is the <em>border<\u002Fem>.<\u002Fp>\n            <div class=\"nested-box\" data-inspect=\"\">\n              <p data-inspect=\"\">The whitespace around the page is the <em>margin<\u002Fem>.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <p data-inspect=\"\">Each paragraph is also a box. Each sentence is a box. Each word is a box. Watch:<\u002Fp>\n\n      <p data-inspect=\"\">\n        <span class=\"word-box\" data-inspect=\"\">Each<\u002Fspan>\n        <span class=\"word-box\" data-inspect=\"\">word<\u002Fspan>\n        <span class=\"word-box\" data-inspect=\"\">is<\u002Fspan>\n        <span class=\"word-box\" data-inspect=\"\">its<\u002Fspan>\n        <span class=\"word-box\" data-inspect=\"\">own<\u002Fspan>\n        <span class=\"word-box\" data-inspect=\"\">little<\u002Fspan>\n        <span class=\"word-box\" data-inspect=\"\">box<\u002Fspan>\n        <span class=\"word-box\" data-inspect=\"\">with<\u002Fspan>\n        <span class=\"word-box\" data-inspect=\"\">content,<\u002Fspan>\n        <span class=\"word-box\" data-inspect=\"\">padding,<\u002Fspan>\n        <span class=\"word-box\" data-inspect=\"\">border,<\u002Fspan>\n        <span class=\"word-box\" data-inspect=\"\">margin.<\u002Fspan>\n      <\u002Fp>\n\n      <div class=\"banner banner--note\">\n        <div class=\"banner__label\">Note<\u002Fdiv>\n        <p>The box model is fractal. The browser window is a box. The screen is a box. Your field of vision is a box — it nests all the way down to the text nodes where this story lives.<\u002Fp>\n      <\u002Fdiv>\n\n      <p data-inspect=\"\">The story is about boxes. The story is inside a box. The story is made of boxes. The story <em>is<\u002Fem> a box.<\u002Fp>\n    <\u002Fsection>\n\n    <!-- Section 3: Inspect (green — tools) -->\n    <section class=\"card card--green\" data-inspect=\"\">\n      <h2 data-inspect=\"\">Part three — inspect every box<\u002Fh2>\n      <p data-inspect=\"\">Use the inspector on the right. Toggle <code>content<\u002Fcode>, <code>padding<\u002Fcode>, <code>border<\u002Fcode>, and <code>margin<\u002Fcode> independently. Hover any element to see a live readout of its computed box-model values and alignment notes. Click to pin a selection so you can talk through it.<\u002Fp>\n\n      <div class=\"banner banner--success\">\n        <div class=\"banner__label\">Try this<\u002Fdiv>\n        <p>Hover a <code>&lt;p&gt;<\u002Fcode> inside a red section card and compare its content-left edge to the next paragraph. They should match. If the alignment panel says \"drifts +1.5px\", that's a real discrepancy — use it to start a conversation about why.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"banner banner--imp\">\n        <div class=\"banner__label\">Important<\u002Fdiv>\n        <p>Dimension tags show numbers rounded to 0.1px. A sub-pixel drift is usually fine; anything above 1px is worth discussing.<\u002Fp>\n      <\u002Fdiv>\n\n      <h3 data-inspect=\"\">What the inspector detects<\u002Fh3>\n      <ul data-inspect=\"\" style=\"padding-left: 24px; margin: 0 0 16px 0;\">\n        <li style=\"margin-bottom: 6px;\">Content-left drift against sibling elements<\u002Fli>\n        <li style=\"margin-bottom: 6px;\">Border-box width mismatches<\u002Fli>\n        <li style=\"margin-bottom: 6px;\">Vertical margin collapse between stacked elements<\u002Fli>\n        <li style=\"margin-bottom: 6px;\">Asymmetric horizontal padding or margin<\u002Fli>\n        <li style=\"margin-bottom: 6px;\">Off-center placement within a parent<\u002Fli>\n      <\u002Ful>\n    <\u002Fsection>\n\n    <!-- Pullquote -->\n    <div class=\"pullquote\" data-inspect=\"\">\n      <p>Everything in CSS is a rectangle. Once you can see the rectangles, you can see the page.<\u002Fp>\n      <cite>— DESN 368, Week 5<\u002Fcite>\n    <\u002Fdiv>\n\n  <\u002Fmain>\n\n  <!-- Inspector rail -->\n  <aside class=\"inspector\" id=\"inspector\" aria-label=\"Box model inspector\">\n    <header class=\"inspector__head\">\n      <span class=\"title\">Box inspector<\u002Fspan>\n      <span class=\"pill\">Live<\u002Fspan>\n    <\u002Fheader>\n\n    <div class=\"inspector__body\">\n\n      <div class=\"inspector__section\">\n        <div class=\"label\">Layers<\u002Fdiv>\n        <label class=\"layer-row\">\n          <input type=\"checkbox\" data-layer=\"content\" checked=\"\">\n          <span class=\"swatch\" style=\"background: var(--bm-content)\"><\u002Fspan>\n          <span>Content<\u002Fspan>\n          <span class=\"key\">C<\u002Fspan>\n        <\u002Flabel>\n        <label class=\"layer-row\">\n          <input type=\"checkbox\" data-layer=\"padding\" checked=\"\">\n          <span class=\"swatch\" style=\"background: var(--bm-padding)\"><\u002Fspan>\n          <span>Padding<\u002Fspan>\n          <span class=\"key\">P<\u002Fspan>\n        <\u002Flabel>\n        <label class=\"layer-row\">\n          <input type=\"checkbox\" data-layer=\"border\" checked=\"\">\n          <span class=\"swatch\" style=\"background: var(--bm-border)\"><\u002Fspan>\n          <span>Border<\u002Fspan>\n          <span class=\"key\">B<\u002Fspan>\n        <\u002Flabel>\n        <label class=\"layer-row\">\n          <input type=\"checkbox\" data-layer=\"margin\" checked=\"\">\n          <span class=\"swatch\" style=\"background: var(--bm-margin)\"><\u002Fspan>\n          <span>Margin<\u002Fspan>\n          <span class=\"key\">M<\u002Fspan>\n        <\u002Flabel>\n      <\u002Fdiv>\n\n      <div class=\"inspector__section\">\n        <div class=\"label\">Scope<\u002Fdiv>\n        <label class=\"ctrl-row\"><input type=\"checkbox\" id=\"scopeAll\"> Show overlays on all elements<\u002Flabel>\n        <label class=\"ctrl-row\"><input type=\"checkbox\" id=\"showDims\" checked=\"\"> Dimension labels<\u002Flabel>\n        <label class=\"ctrl-row\"><input type=\"checkbox\" id=\"showGuides\" checked=\"\"> Alignment guides<\u002Flabel>\n        <div class=\"btn-row\">\n          <button class=\"btn btn--filled\" id=\"allOn\">All on<\u002Fbutton>\n          <button class=\"btn btn--blue\" id=\"allOff\">All off<\u002Fbutton>\n          <button class=\"btn\" id=\"clearPin\">Clear pin<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"inspector__section\">\n        <div class=\"label\">Selection<\u002Fdiv>\n        <div id=\"selTagWrap\"><span class=\"sel-tag sel-tag--empty\" id=\"selTag\">none<\u002Fspan><\u002Fdiv>\n        <div class=\"dim-grid\" id=\"selDims\">\n          <span class=\"k\" style=\"grid-column: 1 / -1; color: var(--fg3); font-family: var(--font-sans); font-size: 13px;\">Hover an element to inspect.<\u002Fspan>\n        <\u002Fdiv>\n\n        <div class=\"bm\" id=\"bmDiagram\" hidden=\"\">\n          <div class=\"bm__tag\" style=\"top:2px; left:4px;\">MARGIN<\u002Fdiv>\n          <div class=\"bm__layer bm__margin\">\n            <span class=\"bm__edge\" data-edge=\"mt\" style=\"top:2px; left:50%; transform:translateX(-50%);\">—<\u002Fspan>\n            <span class=\"bm__edge\" data-edge=\"mr\" style=\"right:2px; top:50%; transform:translateY(-50%);\">—<\u002Fspan>\n            <span class=\"bm__edge\" data-edge=\"mb\" style=\"bottom:2px; left:50%; transform:translateX(-50%);\">—<\u002Fspan>\n            <span class=\"bm__edge\" data-edge=\"ml\" style=\"left:2px; top:50%; transform:translateY(-50%);\">—<\u002Fspan>\n\n            <div class=\"bm__layer bm__border\">\n              <span class=\"bm__edge\" data-edge=\"bt\" style=\"top:-2px; left:50%; transform:translate(-50%,-100%);\">—<\u002Fspan>\n              <span class=\"bm__edge\" data-edge=\"br\" style=\"right:-2px; top:50%; transform:translate(100%,-50%);\">—<\u002Fspan>\n              <span class=\"bm__edge\" data-edge=\"bb\" style=\"bottom:-2px; left:50%; transform:translate(-50%,100%);\">—<\u002Fspan>\n              <span class=\"bm__edge\" data-edge=\"bl\" style=\"left:-2px; top:50%; transform:translate(-100%,-50%);\">—<\u002Fspan>\n\n              <div class=\"bm__layer bm__padding\">\n                <span class=\"bm__edge\" data-edge=\"pt\" style=\"top:2px; left:50%; transform:translateX(-50%);\">—<\u002Fspan>\n                <span class=\"bm__edge\" data-edge=\"pr\" style=\"right:2px; top:50%; transform:translateY(-50%);\">—<\u002Fspan>\n                <span class=\"bm__edge\" data-edge=\"pb\" style=\"bottom:2px; left:50%; transform:translateX(-50%);\">—<\u002Fspan>\n                <span class=\"bm__edge\" data-edge=\"pl\" style=\"left:2px; top:50%; transform:translateY(-50%);\">—<\u002Fspan>\n\n                <div class=\"bm__layer bm__content\">\n                  <span data-edge=\"cs\" style=\"font-family: var(--font-mono); font-size:10px; font-weight:600; color: var(--fg1);\">—<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"inspector__section\">\n        <div class=\"label\">Alignment notes<\u002Fdiv>\n        <div class=\"notes\" id=\"notes\">\n          <div class=\"row\">\n            <span class=\"pill-s pill-s--info\">Idle<\u002Fspan>\n            <span class=\"msg\">Hover an element to see alignment checks against its siblings and parent.<\u002Fspan>\n            <span class=\"val\">—<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Faside>\n<\u002Fdiv>\n\n<div id=\"overlays\" aria-hidden=\"true\"><\u002Fdiv>\n\n<script>\n(function(){\n  const pageRoot  = document.getElementById('page-root');\n  const overlays  = document.getElementById('overlays');\n  const inspector = document.getElementById('inspector');\n  const selTag    = document.getElementById('selTag');\n  const selDims   = document.getElementById('selDims');\n  const bmDiagram = document.getElementById('bmDiagram');\n  const notes     = document.getElementById('notes');\n\n  const layerToggles = Array.from(document.querySelectorAll('input[data-layer]'));\n  const scopeAll   = document.getElementById('scopeAll');\n  const showDims   = document.getElementById('showDims');\n  const showGuides = document.getElementById('showGuides');\n  const clearPinBtn= document.getElementById('clearPin');\n  const allOnBtn   = document.getElementById('allOn');\n  const allOffBtn  = document.getElementById('allOff');\n\n  const state = {\n    layers: { content: true, padding: true, border: true, margin: true },\n    scopeAll: false,\n    showDims: true,\n    showGuides: true,\n    pinned: null,\n    hovered: null,\n  };\n\n  // ---------- positioning: overlays are a document-absolute layer ----------\n  // Set overlays container to page-root's bounds for stable absolute coords.\n  function syncOverlaysBox() {\n    // overlays is position:absolute inset:0 within body; we place items in\n    // page (document) coordinates using scroll offsets.\n    overlays.style.top  = '0';\n    overlays.style.left = '0';\n    overlays.style.width  = document.documentElement.scrollWidth + 'px';\n    overlays.style.height = document.documentElement.scrollHeight + 'px';\n  }\n\n  const fmt = (n) => (Math.round(n * 10) / 10).toString();\n\n  function rectAbs(el) {\n    const r = el.getBoundingClientRect();\n    return {\n      top: r.top + window.scrollY,\n      left: r.left + window.scrollX,\n      right: r.right + window.scrollX,\n      bottom: r.bottom + window.scrollY,\n      width: r.width,\n      height: r.height,\n    };\n  }\n\n  function getBox(el) {\n    const cs = getComputedStyle(el);\n    const r = rectAbs(el);\n    const m = {\n      t: parseFloat(cs.marginTop) || 0,\n      r: parseFloat(cs.marginRight) || 0,\n      b: parseFloat(cs.marginBottom) || 0,\n      l: parseFloat(cs.marginLeft) || 0,\n    };\n    const b = {\n      t: parseFloat(cs.borderTopWidth) || 0,\n      r: parseFloat(cs.borderRightWidth) || 0,\n      b: parseFloat(cs.borderBottomWidth) || 0,\n      l: parseFloat(cs.borderLeftWidth) || 0,\n    };\n    const p = {\n      t: parseFloat(cs.paddingTop) || 0,\n      r: parseFloat(cs.paddingRight) || 0,\n      b: parseFloat(cs.paddingBottom) || 0,\n      l: parseFloat(cs.paddingLeft) || 0,\n    };\n    const content = {\n      top: r.top + b.t + p.t,\n      left: r.left + b.l + p.l,\n      width: Math.max(0, r.width - b.l - b.r - p.l - p.r),\n      height: Math.max(0, r.height - b.t - b.b - p.t - p.b),\n    };\n    const marginBox = {\n      top: r.top - m.t,\n      left: r.left - m.l,\n      right: r.right + m.r,\n      bottom: r.bottom + m.b,\n      width: r.width + m.l + m.r,\n      height: r.height + m.t + m.b,\n    };\n    return { el, rect: r, cs, m, b, p, content, marginBox };\n  }\n\n  function descriptor(el) {\n    const cls = el.classList.length ? '.' + Array.from(el.classList).filter(c => c !== 'is-hover').join('.') : '';\n    return el.tagName.toLowerCase() + cls;\n  }\n\n  // ---------- overlay primitives ----------\n  function clearOverlays() { overlays.innerHTML = ''; }\n\n  function addRect(layer, left, top, width, height) {\n    if (width <= 0 || height <= 0) return;\n    const d = document.createElement('div');\n    d.className = 'bm-overlay bm-overlay--' + layer;\n    d.style.left = left + 'px';\n    d.style.top = top + 'px';\n    d.style.width = width + 'px';\n    d.style.height = height + 'px';\n    overlays.appendChild(d);\n  }\n\n  function drawBoxOverlay(box) {\n    const { rect, m, b, p, content } = box;\n\n    if (state.layers.margin) {\n      addRect('margin', rect.left - m.l, rect.top - m.t, rect.width + m.l + m.r, m.t);\n      addRect('margin', rect.left - m.l, rect.bottom,    rect.width + m.l + m.r, m.b);\n      addRect('margin', rect.left - m.l, rect.top,        m.l, rect.height);\n      addRect('margin', rect.right,       rect.top,        m.r, rect.height);\n    }\n    if (state.layers.border) {\n      addRect('border', rect.left, rect.top, rect.width, b.t);\n      addRect('border', rect.left, rect.bottom - b.b, rect.width, b.b);\n      addRect('border', rect.left, rect.top + b.t, b.l, rect.height - b.t - b.b);\n      addRect('border', rect.right - b.r, rect.top + b.t, b.r, rect.height - b.t - b.b);\n    }\n    if (state.layers.padding) {\n      const pbT = rect.top + b.t, pbL = rect.left + b.l;\n      const pbR = rect.right - b.r, pbB = rect.bottom - b.b;\n      const pbW = pbR - pbL, pbH = pbB - pbT;\n      addRect('padding', pbL, pbT, pbW, p.t);\n      addRect('padding', pbL, pbB - p.b, pbW, p.b);\n      addRect('padding', pbL, pbT + p.t, p.l, pbH - p.t - p.b);\n      addRect('padding', pbR - p.r, pbT + p.t, p.r, pbH - p.t - p.b);\n    }\n    if (state.layers.content) {\n      addRect('content', content.left, content.top, content.width, content.height);\n    }\n  }\n\n  function drawDimTags(box, el) {\n    const { rect, content } = box;\n    const t = document.createElement('div');\n    t.className = 'bm-dim';\n    t.style.left = rect.left + 'px';\n    t.style.top  = Math.max(0, rect.top - 24) + 'px';\n    t.textContent = `${descriptor(el)} · ${fmt(rect.width)} × ${fmt(rect.height)}`;\n    overlays.appendChild(t);\n\n    if (content.width > 40 && content.height > 14) {\n      const c = document.createElement('div');\n      c.className = 'bm-dim bm-dim--content';\n      c.style.left = (content.left + 2) + 'px';\n      c.style.top  = (content.top + 2) + 'px';\n      c.textContent = `content ${fmt(content.width)} × ${fmt(content.height)}`;\n      overlays.appendChild(c);\n    }\n  }\n\n  function drawGuides(box) {\n    const { rect, content, marginBox } = box;\n    addGuide('v', marginBox.left,            'margin ←');\n    addGuide('v', marginBox.right,           'margin →');\n    addGuide('v', content.left,              'content ←');\n    addGuide('v', content.left + content.width, 'content →');\n  }\n\n  function addGuide(dir, pos, label) {\n    const g = document.createElement('div');\n    g.className = 'guide guide--' + dir;\n    if (dir === 'v') g.style.left = pos + 'px';\n    else g.style.top = pos + 'px';\n    overlays.appendChild(g);\n\n    const l = document.createElement('span');\n    l.className = 'guide__label';\n    l.textContent = `${label} ${fmt(pos)}`;\n    if (dir === 'v') {\n      l.style.left = (pos + 4) + 'px';\n      l.style.top  = (window.scrollY + 8) + 'px';\n    } else {\n      l.style.top  = (pos + 2) + 'px';\n      l.style.left = '8px';\n    }\n    overlays.appendChild(l);\n  }\n\n  function drawHalo(el) {\n    const r = rectAbs(el);\n    const h = document.createElement('div');\n    h.className = 'halo';\n    h.style.left = r.left + 'px';\n    h.style.top = r.top + 'px';\n    h.style.width = r.width + 'px';\n    h.style.height = r.height + 'px';\n    overlays.appendChild(h);\n\n    const tag = document.createElement('div');\n    tag.className = 'halo-tag';\n    tag.style.left = r.left + 'px';\n    tag.style.top  = Math.max(window.scrollY + 2, r.top - 22) + 'px';\n    tag.textContent = descriptor(el);\n    overlays.appendChild(tag);\n  }\n\n  // ---------- readout / alignment ----------\n  function updateReadout(el) {\n    const box = getBox(el);\n    selTag.className = 'sel-tag';\n    selTag.textContent = descriptor(el);\n\n    selDims.innerHTML = `\n      <span class=\"k\">border-box<\u002Fspan><span class=\"v\">${fmt(box.rect.width)} × ${fmt(box.rect.height)}<\u002Fspan>\n      <span class=\"k\">content<\u002Fspan>   <span class=\"v\">${fmt(box.content.width)} × ${fmt(box.content.height)}<\u002Fspan>\n      <span class=\"k\">margin<\u002Fspan>    <span class=\"v\">${fmt(box.m.t)} · ${fmt(box.m.r)} · ${fmt(box.m.b)} · ${fmt(box.m.l)}<\u002Fspan>\n      <span class=\"k\">border<\u002Fspan>    <span class=\"v\">${fmt(box.b.t)} · ${fmt(box.b.r)} · ${fmt(box.b.b)} · ${fmt(box.b.l)}<\u002Fspan>\n      <span class=\"k\">padding<\u002Fspan>   <span class=\"v\">${fmt(box.p.t)} · ${fmt(box.p.r)} · ${fmt(box.p.b)} · ${fmt(box.p.l)}<\u002Fspan>\n    `;\n\n    bmDiagram.hidden = false;\n    setEdge('mt', box.m.t); setEdge('mr', box.m.r); setEdge('mb', box.m.b); setEdge('ml', box.m.l);\n    setEdge('bt', box.b.t); setEdge('br', box.b.r); setEdge('bb', box.b.b); setEdge('bl', box.b.l);\n    setEdge('pt', box.p.t); setEdge('pr', box.p.r); setEdge('pb', box.p.b); setEdge('pl', box.p.l);\n    const cs = bmDiagram.querySelector('[data-edge=\"cs\"]');\n    if (cs) cs.textContent = `${fmt(box.content.width)} × ${fmt(box.content.height)}`;\n\n    buildNotes(el, box);\n  }\n\n  function setEdge(key, v) {\n    const n = bmDiagram.querySelector(`[data-edge=\"${key}\"]`);\n    if (n) n.textContent = fmt(v);\n  }\n\n  function resetReadout() {\n    selTag.className = 'sel-tag sel-tag--empty';\n    selTag.textContent = 'none';\n    selDims.innerHTML = `<span class=\"k\" style=\"grid-column: 1 / -1; color: var(--fg3); font-family: var(--font-sans); font-size: 13px;\">Hover an element to inspect.<\u002Fspan>`;\n    bmDiagram.hidden = true;\n    notes.innerHTML = `<div class=\"row\"><span class=\"pill-s pill-s--info\">Idle<\u002Fspan><span class=\"msg\">Hover an element to see alignment checks against its siblings and parent.<\u002Fspan><span class=\"val\">—<\u002Fspan><\u002Fdiv>`;\n  }\n\n  function buildNotes(el, box) {\n    const rows = [];\n\n    const parent = el.parentElement;\n    if (parent) {\n      const sibs = Array.from(parent.children).filter(s => s !== el && s.nodeType === 1 && s.hasAttribute('data-inspect'));\n      const ref = sibs.find(s => s.tagName === el.tagName) || sibs[0];\n      if (ref) {\n        const r = getBox(ref);\n        const d = box.content.left - r.content.left;\n        if (Math.abs(d) < 0.5) {\n          rows.push(['ok', `Content-left matches &lt;${ref.tagName.toLowerCase()}&gt;`, '0px']);\n        } else {\n          rows.push(['warn', `Content-left drifts from &lt;${ref.tagName.toLowerCase()}&gt;`, `${d > 0 ? '+' : ''}${fmt(d)}px`]);\n        }\n        const dw = box.rect.width - r.rect.width;\n        if (Math.abs(dw) < 0.5) {\n          rows.push(['ok', `Border-box width matches &lt;${ref.tagName.toLowerCase()}&gt;`, '0px']);\n        } else {\n          rows.push(['info', `Width differs from &lt;${ref.tagName.toLowerCase()}&gt;`, `${dw > 0 ? '+' : ''}${fmt(dw)}px`]);\n        }\n      }\n    }\n\n    const prev = el.previousElementSibling;\n    if (prev && prev.hasAttribute('data-inspect')) {\n      const pBox = getBox(prev);\n      const gap = box.rect.top - pBox.rect.bottom;\n      const expected = Math.max(box.m.t, pBox.m.b);\n      const sum = box.m.t + pBox.m.b;\n      if (Math.abs(gap - expected) < 1 && Math.abs(sum - expected) > 0.5) {\n        rows.push(['info', `Margin collapsed with &lt;${prev.tagName.toLowerCase()}&gt;`, `gap ${fmt(gap)} = max(${fmt(box.m.t)}, ${fmt(pBox.m.b)})`]);\n      } else if (Math.abs(gap - sum) < 1) {\n        rows.push(['ok', `No collapse vs &lt;${prev.tagName.toLowerCase()}&gt;`, `gap ${fmt(gap)}px`]);\n      } else {\n        rows.push(['info', `Gap to &lt;${prev.tagName.toLowerCase()}&gt;`, `${fmt(gap)}px`]);\n      }\n    }\n\n    if (Math.abs(box.p.l - box.p.r) > 0.5) {\n      rows.push(['warn', `Asymmetric horizontal padding`, `L ${fmt(box.p.l)} / R ${fmt(box.p.r)}`]);\n    } else if (box.p.l > 0) {\n      rows.push(['ok', `Horizontal padding symmetric`, `${fmt(box.p.l)}px`]);\n    }\n    if (Math.abs(box.m.l - box.m.r) > 0.5 && box.m.l !== 0 && box.m.r !== 0) {\n      rows.push(['warn', `Asymmetric horizontal margin`, `L ${fmt(box.m.l)} / R ${fmt(box.m.r)}`]);\n    }\n\n    if (el.parentElement) {\n      const pBox = getBox(el.parentElement);\n      const leftSlack  = box.rect.left - (pBox.rect.left + pBox.b.l + pBox.p.l);\n      const rightSlack = (pBox.rect.right - pBox.b.r - pBox.p.r) - box.rect.right;\n      if (Math.abs(leftSlack - rightSlack) > 0.5) {\n        rows.push(['info', `Off-center in parent`, `L ${fmt(leftSlack)} / R ${fmt(rightSlack)}`]);\n      } else if (leftSlack > 0.5) {\n        rows.push(['ok', `Centered in parent`, `${fmt(leftSlack)}px each side`]);\n      }\n    }\n\n    if (!rows.length) rows.push(['info', 'No alignment notes', '—']);\n\n    notes.innerHTML = rows.map(([k, msg, val]) =>\n      `<div class=\"row\"><span class=\"pill-s pill-s--${k}\">${k}<\u002Fspan><span class=\"msg\">${msg}<\u002Fspan><span class=\"val\">${val}<\u002Fspan><\u002Fdiv>`\n    ).join('');\n  }\n\n  // ---------- render ----------\n  function render() {\n    syncOverlaysBox();\n    clearOverlays();\n\n    if (state.scopeAll) {\n      const all = pageRoot.querySelectorAll('[data-inspect]');\n      all.forEach(el => drawBoxOverlay(getBox(el)));\n    }\n\n    const active = state.pinned || state.hovered;\n    if (active && document.body.contains(active)) {\n      const box = getBox(active);\n      if (!state.scopeAll) drawBoxOverlay(box);\n      if (state.showDims) drawDimTags(box, active);\n      if (state.showGuides) drawGuides(box);\n      drawHalo(active);\n      updateReadout(active);\n    } else {\n      resetReadout();\n    }\n  }\n\n  // ---------- events ----------\n  document.addEventListener('mousemove', (e) => {\n    if (inspector.contains(e.target)) return;\n    const el = e.target.closest('[data-inspect]');\n    if (el !== state.hovered) {\n      state.hovered = el;\n      render();\n    }\n  });\n\n  document.addEventListener('click', (e) => {\n    if (inspector.contains(e.target)) return;\n    const el = e.target.closest('[data-inspect]');\n    if (el) {\n      e.preventDefault();\n      state.pinned = (state.pinned === el) ? null : el;\n      render();\n    }\n  });\n\n  layerToggles.forEach(t => t.addEventListener('change', () => {\n    state.layers[t.dataset.layer] = t.checked;\n    render();\n  }));\n  scopeAll.addEventListener('change',   () => { state.scopeAll   = scopeAll.checked;   render(); });\n  showDims.addEventListener('change',   () => { state.showDims   = showDims.checked;   render(); });\n  showGuides.addEventListener('change', () => { state.showGuides = showGuides.checked; render(); });\n\n  clearPinBtn.addEventListener('click', () => { state.pinned = null; render(); });\n  allOnBtn.addEventListener('click', () => {\n    layerToggles.forEach(t => { t.checked = true; state.layers[t.dataset.layer] = true; });\n    scopeAll.checked = true; state.scopeAll = true;\n    render();\n  });\n  allOffBtn.addEventListener('click', () => {\n    layerToggles.forEach(t => { t.checked = false; state.layers[t.dataset.layer] = false; });\n    scopeAll.checked = false; state.scopeAll = false;\n    state.pinned = null; state.hovered = null;\n    render();\n  });\n\n  // keyboard toggles C / P / B / M and Esc to clear pin\n  window.addEventListener('keydown', (e) => {\n    if (e.target.matches('input, textarea')) return;\n    const map = { c: 'content', p: 'padding', b: 'border', m: 'margin' };\n    const k = e.key.toLowerCase();\n    if (map[k]) {\n      const toggle = layerToggles.find(t => t.dataset.layer === map[k]);\n      if (toggle) {\n        toggle.checked = !toggle.checked;\n        state.layers[map[k]] = toggle.checked;\n        render();\n      }\n    } else if (e.key === 'Escape') {\n      state.pinned = null; render();\n    } else if (k === 'a') {\n      scopeAll.checked = !scopeAll.checked;\n      state.scopeAll = scopeAll.checked;\n      render();\n    }\n  });\n\n  window.addEventListener('scroll', render, { passive: true });\n  window.addEventListener('resize', render);\n\n  render();\n})();\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
