    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.

    // would push the parser into quirks mode. DOMParser always emits a <head>

t: 1.6;\n  background: var(--bg-surface);\n  border: 1px solid var(--border-light);\n  border-radius: 6px;\n  padding: 16px 18px;\n  color: var(--fg1);\n  white-space: pre;\n  overflow-x: auto;\n  tab-size: 2;\n}\n.codeblock .sel { color: var(--eagle-red-text); }\n.codeblock .prop { color: var(--eagle-blue-text); }\n.codeblock .str { color: var(--eagle-green-text); }\n.codeblock .com { color: var(--fg3); }\n.codeblock .tag { color: var(--eagle-red-text); }\n.codeblock .attr { color: var(--eagle-blue-text); }\n.codeblock .dropped { color: var(--fg3); text-decoration: line-through; }\n.codeblock .hl { background: rgba(1,186,239,0.18); padding: 1px 2px; border-radius: 2px; }\n\n.code-inline {\n  font-family: var(--font-mono);\n  font-size: 14px;\n  background: var(--bg-surface);\n  padding: 2px 6px;\n  border-radius: 3px;\n  color: var(--eagle-red-text);\n}\n\n/* ---------- Preview panels ---------- */\n.demo-grid {\n  display: grid;\n  grid-template-columns: 1fr;\n  gap: 16px;\n  margin-top: 4px;\n}\n@media (min-width: 860px) {\n  .demo-grid.split { grid-template-columns: 1.15fr 1fr; }\n}\n.preview-panel {\n  background: var(--bg);\n  border: 1px solid var(--border-light);\n  border-radius: 6px;\n  padding: 28px 28px 24px;\n  min-height: 160px;\n  position: relative;\n}\n.preview-panel .panel-lbl {\n  position: absolute;\n  top: 10px;\n  left: 14px;\n  font-family: var(--font-mono);\n  font-size: 10px;\n  font-weight: 600;\n  letter-spacing: 0.08em;\n  text-transform: uppercase;\n  color: var(--fg3);\n}\n\n.demo-text {\n  font-size: 44px;\n  line-height: 1.15;\n  letter-spacing: -0.01em;\n  color: var(--fg1);\n  margin: 24px 0 8px 0;\n  transition: font-family 280ms ease, font-weight 280ms ease, letter-spacing 280ms ease;\n  word-wrap: break-word;\n}\n@media (max-width: 620px) {\n  .demo-text { font-size: 32px; }\n}\n.resolved-note {\n  font-family: var(--font-mono);\n  font-size: 11px;\n  letter-spacing: 0.06em;\n  text-transform: uppercase;\n  color: var(--fg2);\n  margin-top: 8px;\n}\n.resolved-note b { color: var(--fg1); }\n\n/* ---------- Section 1: toggle ---------- */\n.switch-row {\n  display: flex;\n  align-items: center;\n  gap: 12px;\n  margin-top: 16px;\n}\n.switch {\n  --h: 28px;\n  position: relative;\n  display: inline-block;\n  width: 52px;\n  height: var(--h);\n  flex-shrink: 0;\n}\n.switch input { opacity: 0; width: 0; height: 0; }\n.switch .track {\n  position: absolute; inset: 0;\n  background: #DDE1DE;\n  border: 1px solid var(--border);\n  border-radius: 20px;\n  cursor: pointer;\n  transition: background 160ms;\n}\n.switch .thumb {\n  position: absolute;\n  top: 3px; left: 3px;\n  width: 20px; height: 20px;\n  border-radius: 50%;\n  background: #fff;\n  box-shadow: 0 1px 2px rgba(0,0,0,0.12);\n  transition: left 160ms;\n}\n.switch input:checked + .track { background: var(--eagle-red); border-color: var(--eagle-red); }\n.switch input:checked + .track + .thumb { left: 29px; }\n.switch-row label.title {\n  font-weight: 600;\n  font-size: 14px;\n  color: var(--fg1);\n}\n.switch-row .sub {\n  font-size: 13px;\n  color: var(--fg2);\n}\n\n/* ---------- Section 2: stack chips ---------- */\n.stack-chips {\n  display: flex;\n  flex-wrap: wrap;\n  gap: 8px;\n  align-items: center;\n  margin-top: 8px;\n}\n.stack-chip {\n  font-family: var(--font-mono);\n  font-size: 13px;\n  padding: 8px 12px 8px 14px;\n  background: var(--bg-surface);\n  border: 1px solid var(--border-light);\n  border-radius: 6px;\n  color: var(--fg1);\n  display: inline-flex;\n  align-items: center;\n  gap: 8px;\n  cursor: pointer;\n  transition: all 180ms;\n}\n.stack-chip.active:hover {\n  border-color: var(--eagle-red);\n  color: var(--eagle-red-text);\n  background: var(--eagle-red-subtle);\n}\n.stack-chip.dropped {\n  color: var(--fg3);\n  text-decoration: line-through;\n  background: transparent;\n  border-style: dashed;\n  cursor: pointer;\n}\n.stack-chip.dropped:hover { border-color: var(--eagle-green-text); color: var(--eagle-green-text); }\n.stack-chip.generic { border-color: var(--eagle-green-border); background: var(--eagle-green-subtle); color: var(--eagle-green-text); cursor: default; }\n.stack-chip.generic:hover { background: var(--eagle-green-subtle); }\n.stack-chip .x {\n  font-size: 14px;\n  font-weight: 700;\n  color: var(--fg3);\n  line-height: 1;\n}\n.stack-chip.active:hover .x { color: var(--eagle-red-text); }\n.arrow-sep {\n  color: var(--fg3);\n  font-family: var(--font-mono);\n  font-size: 12px;\n}\n\n.controls-row {\n  display: flex;\n  gap: 12px;\n  margin-top: 16px;\n  flex-wrap: wrap;\n  align-items: center;\n}\n\n/* ---------- Section 3: two-step ---------- */\n.html-head-box, .css-rule-box {\n  font-family: var(--font-mono);\n  font-size: 13px;\n  line-height: 1.6;\n  background: var(--bg-surface);\n  border: 1px solid var(--border-light);\n  border-radius: 6px;\n  padding: 16px 18px;\n  color: var(--fg1);\n  white-space: pre;\n  overflow-x: auto;\n}\n.placeholder-slot {\n  display: inline-block;\n  padding: 2px 8px;\n  border: 1px dashed var(--fg3);\n  border-radius: 3px;\n  color: var(--fg3);\n  font-style: italic;\n  min-width: 120px;\n  text-align: center;\n}\n.placeholder-slot.filled {\n  border-style: solid;\n  border-color: var(--eagle-green-text);\n  background: var(--eagle-green-subtle);\n  color: var(--eagle-green-text);\n  font-style: normal;\n  text-align: left;\n}\n.step-checklist {\n  display: flex;\n  flex-direction: column;\n  gap: 8px;\n  margin-top: 16px;\n}\n.step-row {\n  display: flex;\n  align-items: center;\n  gap: 12px;\n  padding: 12px 14px;\n  border: 1px solid var(--border-light);\n  border-radius: 6px;\n  background: var(--bg);\n}\n.step-row.done { border-color: var(--eagle-green-border); background: var(--eagle-green-subtle); }\n.step-row .checkbox {\n  width: 20px; height: 20px;\n  border: 1.5px solid var(--border);\n  border-radius: 4px;\n  flex-shrink: 0;\n  display: flex; align-items: center; justify-content: center;\n  background: #fff;\n  color: #fff;\n  font-size: 14px;\n  font-weight: 700;\n}\n.step-row.done .checkbox {\n  background: var(--eagle-green-text);\n  border-color: var(--eagle-green-text);\n}\n.step-row .step-label {\n  flex: 1;\n  font-size: 14px;\n  font-weight: 500;\n}\n.step-row .step-btn {\n  font-family: var(--font-sans);\n  font-size: 13px;\n  font-weight: 600;\n  padding: 6px 12px;\n  border-radius: 6px;\n  border: 1px solid var(--eagle-green-text);\n  color: var(--eagle-green-text);\n  background: transparent;\n  cursor: pointer;\n}\n.step-row .step-btn:hover { background: rgba(43,112,21,0.08); }\n.step-row.done .step-btn {\n  background: transparent;\n  border-color: var(--border);\n  color: var(--fg2);\n}\n.status-msg {\n  font-family: var(--font-mono);\n  font-size: 12px;\n  letter-spacing: 0.05em;\n  text-transform: uppercase;\n  margin-top: 12px;\n  padding: 10px 14px;\n  border-radius: 4px;\n  border: 1px solid var(--border-light);\n}\n.status-msg.neutral { color: var(--fg2); background: var(--bg-surface); }\n.status-msg.warn    { color: var(--warning); background: var(--warning-subtle); border-color: var(--warning-border); }\n.status-msg.ok      { color: var(--eagle-green-text); background: var(--eagle-green-subtle); border-color: var(--eagle-green-border); }\n\n/* ---------- Section 4: sandbox ---------- */\n.sandbox-row {\n  display: flex;\n  gap: 12px;\n  align-items: stretch;\n  flex-wrap: wrap;\n  margin-top: 8px;\n}\n.sandbox-input {\n  flex: 1 1 260px;\n  font-family: var(--font-mono);\n  font-size: 14px;\n  padding: 10px 14px;\n  border: 1px solid var(--border);\n  border-radius: 6px;\n  background: var(--bg);\n  color: var(--fg1);\n}\n.sandbox-input:focus {\n  outline: 2px solid var(--eagle-red);\n  outline-offset: 2px;\n}\n.preset-chips {\n  display: flex;\n  flex-wrap: wrap;\n  gap: 8px;\n  margin-top: 14px;\n}\n.preset-chip {\n  font-size: 14px;\n  padding: 8px 14px;\n  background: var(--bg-surface);\n  border: 1px solid var(--border-light);\n  border-radius: 20px;\n  color: var(--fg1);\n  cursor: pointer;\n  transition: all 160ms;\n}\n.preset-chip:hover { border-color: var(--fg2); }\n.preset-chip.active {\n  background: var(--eagle-red-subtle);\n  border-color: var(--eagle-red);\n  color: var(--eagle-red-text);\n  font-weight: 600;\n}\n.sandbox-editor {\n  font-family: var(--font-mono);\n  font-size: 13px;\n  line-height: 1.6;\n  background: var(--bg-surface);\n  border: 1px solid var(--border-light);\n  border-radius: 6px;\n  padding: 14px 16px;\n  color: var(--fg1);\n  margin-top: 12px;\n  white-space: pre;\n  overflow-x: auto;\n}\n.sandbox-textarea {\n  width: 100%;\n  min-height: 100px;\n  resize: vertical;\n  font-family: var(--font-sans);\n  font-size: 20px;\n  line-height: 1.5;\n  padding: 14px 16px;\n  border: 1px solid var(--border-light);\n  border-radius: 6px;\n  background: var(--bg);\n  color: var(--fg1);\n  margin-top: 12px;\n  transition: font-family 280ms;\n}\n.sandbox-textarea:focus {\n  outline: 2px solid var(--eagle-red);\n  outline-offset: 2px;\n}\n.load-indicator {\n  display: inline-flex;\n  align-items: center;\n  gap: 6px;\n  font-family: var(--font-mono);\n  font-size: 11px;\n  letter-spacing: 0.06em;\n  text-transform: uppercase;\n  color: var(--fg2);\n  margin-top: 10px;\n  min-height: 16px;\n}\n.load-indicator .dot {\n  width: 6px; height: 6px; border-radius: 50%;\n  background: var(--fg3);\n}\n.load-indicator.loading .dot { background: var(--warning); animation: pulse 900ms ease-in-out infinite; }\n.load-indicator.ok .dot { background: var(--eagle-green-text); }\n.load-indicator.err .dot { background: var(--eagle-red); }\n@keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }\n\n/* ---------- Footer ---------- */\n.footer {\n  margin-top: 24px;\n  padding: 20px 24px;\n  font-family: var(--font-mono);\n  font-size: 12px;\n  color: var(--fg2);\n  background: var(--bg-card);\n  border: 1px solid var(--border-light);\n  border-radius: 6px;\n  display: flex;\n  justify-content: space-between;\n  align-items: center;\n  flex-wrap: wrap;\n  gap: 8px;\n}\n\n/* ---------- Weight primer ---------- */\n.primer {\n  background: var(--bg-card);\n  border: 1px solid var(--border-light);\n  border-radius: 6px;\n  padding: 24px 28px 28px;\n  margin-bottom: 16px;\n}\n.primer .eyebrow {\n  font-family: var(--font-mono);\n  font-size: 12px;\n  font-weight: 600;\n  letter-spacing: 0.08em;\n  text-transform: uppercase;\n  color: var(--fg2);\n  margin-bottom: 8px;\n}\n.primer h3 {\n  font-family: var(--font-sans);\n  font-size: 18px;\n  font-weight: 600;\n  line-height: 1.3;\n  color: var(--fg1);\n  margin: 0 0 6px 0;\n}\n.primer .primer-lede {\n  font-size: 14px;\n  line-height: 1.6;\n  color: var(--fg2);\n  max-width: 70ch;\n  margin: 0 0 18px 0;\n}\n.weight-ladder {\n  display: grid;\n  grid-template-columns: repeat(9, 1fr);\n  gap: 4px;\n  margin-top: 4px;\n}\n.weight-rung {\n  text-align: center;\n  padding: 14px 4px 10px;\n  border-radius: 4px;\n  cursor: pointer;\n  transition: background 140ms;\n  border: 1px solid transparent;\n}\n.weight-rung:hover { background: var(--bg-surface); }\n.weight-rung.active {\n  background: var(--eagle-red-subtle);\n  border-color: var(--eagle-red-border);\n}\n.weight-rung .big {\n  font-family: 'Inter', var(--font-sans);\n  font-size: 28px;\n  line-height: 1;\n  color: var(--fg1);\n  display: block;\n  letter-spacing: -0.01em;\n}\n.weight-rung .num {\n  font-family: var(--font-mono);\n  font-size: 10px;\n  letter-spacing: 0.06em;\n  color: var(--fg2);\n  margin-top: 8px;\n  display: block;\n}\n.weight-rung .name {\n  font-family: var(--font-mono);\n  font-size: 10px;\n  letter-spacing: 0.04em;\n  color: var(--fg3);\n  margin-top: 2px;\n  display: block;\n  height: 12px;\n}\n.weight-rung.active .num { color: var(--eagle-red-text); font-weight: 700; }\n.weight-rung.active .name { color: var(--eagle-red-text); }\n@media (max-width: 720px) {\n  .weight-ladder { grid-template-columns: repeat(5, 1fr); }\n  .weight-rung .big { font-size: 22px; }\n  .weight-rung:nth-child(n+6) { display: none; } /* hide 600-900 on narrow */\n}\n.primer .hint {\n  margin-top: 14px;\n  font-family: var(--font-mono);\n  font-size: 12px;\n  color: var(--fg2);\n  letter-spacing: 0.03em;\n}\n.primer .hint b { color: var(--fg1); }\n.primer-subhead {\n  display: flex;\n  align-items: baseline;\n  gap: 12px;\n  margin: 6px 0 10px;\n  flex-wrap: wrap;\n}\n.primer-subhead .kicker {\n  font-family: var(--font-mono);\n  font-size: 11px;\n  font-weight: 700;\n  letter-spacing: 0.10em;\n  text-transform: uppercase;\n  color: var(--fg1);\n}\n.primer-subhead .kicker-note {\n  font-family: var(--font-mono);\n  font-size: 11px;\n  letter-spacing: 0.04em;\n  color: var(--fg2);\n}\n.primer-divider {\n  height: 1px;\n  background: var(--border-light);\n  margin: 22px 0 18px;\n}\n\n/* ---------- Size ladder ---------- */\n.size-ladder {\n  display: flex;\n  flex-wrap: wrap;\n  align-items: flex-end;\n  gap: 6px;\n  padding: 20px 14px 10px;\n  background: var(--bg-subtle);\n  border: 1px solid var(--border-light);\n  border-radius: 6px;\n  overflow-x: auto;\n}\n.size-rung {\n  flex: 0 0 auto;\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  gap: 6px;\n  padding: 6px 10px 8px;\n  border: 1px solid transparent;\n  border-radius: 4px;\n  cursor: pointer;\n  background: transparent;\n  transition: background 140ms, border-color 140ms;\n  min-width: 56px;\n}\n.size-rung:hover { background: var(--bg-surface); }\n.size-rung.active {\n  background: var(--eagle-red-subtle);\n  border-color: var(--eagle-red-border);\n}\n.size-rung .glyph {\n  font-family: 'Inter', var(--font-sans);\n  font-weight: 500;\n  line-height: 1;\n  color: var(--fg1);\n  letter-spacing: -0.01em;\n}\n.size-rung .px {\n  font-family: var(--font-mono);\n  font-size: 10px;\n  letter-spacing: 0.04em;\n  color: var(--fg2);\n}\n.size-rung .role {\n  font-family: var(--font-mono);\n  font-size: 9px;\n  letter-spacing: 0.06em;\n  text-transform: uppercase;\n  color: var(--fg3);\n  height: 11px;\n}\n.size-rung.active .px { color: var(--eagle-red-text); font-weight: 700; }\n.size-rung.active .role { color: var(--eagle-red-text); }\n@media (max-width: 720px) {\n  .size-ladder { gap: 4px; padding: 14px 10px 8px; }\n  .size-rung { min-width: 48px; padding: 4px 6px 6px; }\n}\n\n/* ---------- Small helpers ---------- */\n.inline-kbd {\n  font-family: var(--font-mono);\n  font-size: 11px;\n  padding: 1px 6px;\n  border: 1px solid var(--border);\n  border-radius: 3px;\n  background: var(--bg-surface);\n  color: var(--fg2);\n}\n.scroll-anchor { scroll-margin-top: 20px; }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<main class=\"page\">\n\n  <!-- ============== COURSE HEADER ============== -->\n  <section class=\"course-header\" aria-labelledby=\"pg-title\">\n    <span class=\"badge\">DESN 368<\u002Fspan>\n    <h1 id=\"pg-title\">Fonts &amp; Google Fonts<\u002Fh1>\n    <p class=\"meta-line\">Web Design Fundamentals · Spring 2026 · Module 04<\u002Fp>\n    <div class=\"divider\" role=\"presentation\"><\u002Fdiv>\n    <div class=\"meta-row\">\n      <span>Topic: Typography on the web<\u002Fspan>\n      <span>Reading: ~12 min<\u002Fspan>\n      <span>Interactive: 4 demos<\u002Fspan>\n      <span class=\"active\">Required<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============== STEP NAV ============== -->\n  <nav class=\"stepnav\" aria-label=\"Section navigation\">\n    <a href=\"#s1\"><span class=\"num\">01<\u002Fspan><span class=\"label\">The break<\u002Fspan><\u002Fa>\n    <a href=\"#s2\"><span class=\"num\">02<\u002Fspan><span class=\"label\">Font stacking<\u002Fspan><\u002Fa>\n    <a href=\"#s3\"><span class=\"num\">03<\u002Fspan><span class=\"label\">Loading a font<\u002Fspan><\u002Fa>\n    <a href=\"#s4\"><span class=\"num\">04<\u002Fspan><span class=\"label\">Try it<\u002Fspan><\u002Fa>\n  <\u002Fnav>\n\n  <!-- ============== FONT-WEIGHT + SIZE PRIMER ============== -->\n  <section class=\"primer\" aria-labelledby=\"primer-title\">\n    <div class=\"eyebrow\">Pixels · a quick primer<\u002Fdiv>\n    <h3 id=\"primer-title\">Weight and size, in numbers<\u002Fh3>\n    <p class=\"primer-lede\">Two properties do most of the heavy lifting. <b>Weight<\u002Fb> is how heavy each letter sits; <b>size<\u002Fb> is how tall it is in pixels. We'll cover <span class=\"code-inline\">em<\u002Fspan> and <span class=\"code-inline\">rem<\u002Fspan> next week — for now, pixels (<span class=\"code-inline\">px<\u002Fspan>) are the plainest way to set a size.<\u002Fp>\n\n    <div class=\"primer-subhead\">\n      <span class=\"kicker\">Weight<\u002Fspan>\n      <span class=\"kicker-note\"><span class=\"code-inline\">font-weight<\u002Fspan> · 100 – 900 in steps of 100<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"weight-ladder\" id=\"primer-ladder\" role=\"radiogroup\" aria-label=\"Font weight\"><\u002Fdiv>\n    <div class=\"hint\" id=\"primer-hint\">Selected: <b>400 · Regular<\u002Fb> · <span class=\"code-inline\">font-weight: 400;<\u002Fspan><\u002Fdiv>\n\n    <div class=\"primer-divider\" role=\"presentation\"><\u002Fdiv>\n\n    <div class=\"primer-subhead\">\n      <span class=\"kicker\">Size<\u002Fspan>\n      <span class=\"kicker-note\"><span class=\"code-inline\">font-size<\u002Fspan> in pixels<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"size-ladder\" id=\"size-ladder\" role=\"radiogroup\" aria-label=\"Font size\"><\u002Fdiv>\n    <div class=\"hint\" id=\"size-hint\">Selected: <b>16px · Body<\u002Fb> · <span class=\"code-inline\">font-size: 16px;<\u002Fspan><\u002Fdiv>\n\n    <div class=\"banner note\" style=\"margin-top: 18px;\">\n      <span class=\"lbl\">Tied to loading<\u002Fspan>\n      A font file only contains the weights you request. If your Google Fonts link loads <span class=\"code-inline\">wght@400<\u002Fspan> but your CSS says <span class=\"code-inline\">font-weight: 700<\u002Fspan>, the browser fakes bold — usually badly. Load the weights you plan to use.\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============================================================\n       SECTION 1 — The break\n       ============================================================ -->\n  <section class=\"section scroll-anchor\" id=\"s1\">\n    <div class=\"eyebrow\">01 · The break<\u002Fdiv>\n    <h2>A font the browser doesn't have<\u002Fh2>\n    <p class=\"lede\">Flip the switch. The browser tries to use <span class=\"code-inline\">\"Playfair Display\"<\u002Fspan>, but if it isn't available it silently falls through to whatever the system has. Watch the letters change shape.<\u002Fp>\n\n    <div class=\"demo-grid split\">\n      <div class=\"preview-panel\">\n        <span class=\"panel-lbl\">Preview<\u002Fspan>\n        <div id=\"s1-text\" class=\"demo-text\" style=\"font-family: 'Playfair Display', Georgia, serif; font-weight: 600;\">\n          Typography sets the tone.\n        <\u002Fdiv>\n        <div id=\"s1-resolved\" class=\"resolved-note\">Rendering with: <b>Playfair Display<\u002Fb><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div>\n        <div class=\"codeblock\" id=\"s1-css\"><span class=\"sel\">.headline<\u002Fspan> {\n  <span class=\"prop\">font-family<\u002Fspan>: <span class=\"str\">\"Playfair Display\"<\u002Fspan>;\n  <span class=\"prop\">font-weight<\u002Fspan>: <span class=\"str\">600<\u002Fspan>;\n}<\u002Fdiv>\n\n        <div class=\"switch-row\">\n          <label class=\"switch\">\n            <input type=\"checkbox\" id=\"s1-toggle\" aria-label=\"Simulate font not installed\">\n            <span class=\"track\"><\u002Fspan>\n            <span class=\"thumb\"><\u002Fspan>\n          <\u002Flabel>\n          <div>\n            <div class=\"title\">Simulate font not installed<\u002Fdiv>\n            <div class=\"sub\" id=\"s1-sub\">The font is loaded.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"banner note\">\n          <span class=\"lbl\">Note<\u002Fspan>\n          The browser can only use fonts it has access to. Without a fallback, it reaches for whatever generic family is closest — and that choice is the operating system's, not yours.\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============================================================\n       SECTION 2 — Font stacking\n       ============================================================ -->\n  <section class=\"section info scroll-anchor\" id=\"s2\">\n    <div class=\"eyebrow\">02 · Font stacking<\u002Fdiv>\n    <h2>A stack of fallbacks<\u002Fh2>\n    <p class=\"lede\">A <b>font stack<\u002Fb> is a list the browser walks through, left to right, picking the first one it can render. Click a font to drop it from the stack and watch the text reflow into the next candidate.<\u002Fp>\n\n    <div class=\"demo-grid split\">\n      <div class=\"preview-panel\">\n        <span class=\"panel-lbl\">Preview<\u002Fspan>\n        <div id=\"s2-text\" class=\"demo-text\">\n          The quick brown fox.\n        <\u002Fdiv>\n        <div id=\"s2-resolved\" class=\"resolved-note\">Rendering with: <b>—<\u002Fb><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div>\n        <div class=\"codeblock\" id=\"s2-css\"><\u002Fdiv>\n\n        <div style=\"margin-top: 16px;\">\n          <div class=\"eyebrow\" style=\"color: var(--fg2); margin-bottom: 8px;\">Click to drop a font<\u002Fdiv>\n          <div class=\"stack-chips\" id=\"s2-chips\"><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"controls-row\">\n          <button class=\"btn blue sm\" id=\"s2-reset\">Reset stack<\u002Fbutton>\n          <span class=\"resolved-note\" id=\"s2-hint\">Each drop shifts the browser one step deeper into the fallback list.<\u002Fspan>\n        <\u002Fdiv>\n\n        <div class=\"banner note\">\n          <span class=\"lbl\">Rule of thumb<\u002Fspan>\n          Always end a stack with a <b>generic family<\u002Fb> — <span class=\"code-inline\">serif<\u002Fspan>, <span class=\"code-inline\">sans-serif<\u002Fspan>, or <span class=\"code-inline\">monospace<\u002Fspan>. That guarantees the browser has somewhere to land.\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============================================================\n       SECTION 3 — Loading a Google Font\n       ============================================================ -->\n  <section class=\"section tools scroll-anchor\" id=\"s3\">\n    <div class=\"eyebrow\">03 · Loading a font<\u002Fdiv>\n    <h2>Two steps, in this order<\u002Fh2>\n    <p class=\"lede\">A Google Font is only usable when <b>both<\u002Fb> things are true: the stylesheet is linked in the <span class=\"code-inline\">&lt;head&gt;<\u002Fspan>, <b>and<\u002Fb> a CSS rule actually names the font. Miss either step and the text falls back silently.<\u002Fp>\n\n    <div class=\"demo-grid split\">\n      <div class=\"preview-panel\">\n        <span class=\"panel-lbl\">Preview<\u002Fspan>\n        <div id=\"s3-text\" class=\"demo-text\" style=\"font-family: Georgia, serif;\">\n          Hello, Lora.\n        <\u002Fdiv>\n        <div id=\"s3-resolved\" class=\"resolved-note\">Rendering with: <b>Georgia<\u002Fb> (fallback)<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div>\n        <div class=\"eyebrow\" style=\"color: var(--fg2); margin-bottom: 6px;\">index.html — head<\u002Fdiv>\n        <div class=\"html-head-box\" id=\"s3-html\">&lt;head&gt;\n  <span id=\"s3-link-slot\"><span class=\"placeholder-slot\" id=\"s3-link-ph\">empty &lt;link&gt; tag<\u002Fspan><\u002Fspan>\n&lt;/head&gt;<\u002Fdiv>\n\n        <div class=\"eyebrow\" style=\"color: var(--fg2); margin: 14px 0 6px 0;\">styles.css<\u002Fdiv>\n        <div class=\"css-rule-box\" id=\"s3-css\">.greeting {\n  font-family: <span id=\"s3-family-slot\"><span class=\"placeholder-slot\" id=\"s3-family-ph\">generic fallback<\u002Fspan><\u002Fspan>;\n}<\u002Fdiv>\n\n        <div class=\"step-checklist\">\n          <div class=\"step-row\" id=\"s3-step1\">\n            <div class=\"checkbox\" aria-hidden=\"true\">✓<\u002Fdiv>\n            <div class=\"step-label\">Add the Google Fonts <span class=\"code-inline\">&lt;link&gt;<\u002Fspan> to <span class=\"code-inline\">&lt;head&gt;<\u002Fspan><\u002Fdiv>\n            <button class=\"step-btn\" data-step=\"1\">Add<\u002Fbutton>\n          <\u002Fdiv>\n          <div class=\"step-row\" id=\"s3-step2\">\n            <div class=\"checkbox\" aria-hidden=\"true\">✓<\u002Fdiv>\n            <div class=\"step-label\">Reference <span class=\"code-inline\">\"Lora\"<\u002Fspan> in <span class=\"code-inline\">font-family<\u002Fspan><\u002Fdiv>\n            <button class=\"step-btn\" data-step=\"2\">Add<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"status-msg neutral\" id=\"s3-status\">Neither step done. The browser only has the fallback to work with.<\u002Fdiv>\n\n        <div class=\"controls-row\">\n          <button class=\"btn green sm\" id=\"s3-reset\">Reset walkthrough<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============================================================\n       SECTION 4 — Sandbox\n       ============================================================ -->\n  <section class=\"section scroll-anchor\" id=\"s4\">\n    <div class=\"eyebrow\">04 · Try it<\u002Fdiv>\n    <h2>Load any Google Font you like<\u002Fh2>\n    <p class=\"lede\">Type a font name from <a href=\"https://fonts.google.com\" target=\"_blank\" rel=\"noopener\" style=\"color: var(--eagle-blue-text); text-decoration: underline; text-underline-offset: 2px; font-weight: 500;\">fonts.google.com<\u002Fa> and it will load and apply below. Or pick one of the presets to see the same pattern without typing.<\u002Fp>\n\n    <div class=\"preview-panel\" style=\"padding: 20px 20px 24px;\">\n      <span class=\"panel-lbl\">Sandbox<\u002Fspan>\n\n      <div class=\"sandbox-row\" style=\"margin-top: 22px;\">\n        <input id=\"s4-input\" type=\"text\" class=\"sandbox-input\" placeholder=\"e.g. &quot;Space Grotesk&quot;, &quot;Fraunces&quot;, &quot;JetBrains Mono&quot;…\" spellcheck=\"false\" autocomplete=\"off\">\n        <button class=\"btn filled\" id=\"s4-load\">Load font<\u002Fbutton>\n      <\u002Fdiv>\n      <div id=\"s4-loadstatus\" class=\"load-indicator\"><span class=\"dot\"><\u002Fspan><span class=\"msg\">Idle. Pick a preset or type a font name.<\u002Fspan><\u002Fdiv>\n\n      <div class=\"preset-chips\" id=\"s4-presets\"><\u002Fdiv>\n\n      <div class=\"sandbox-editor\" id=\"s4-css\"><\u002Fdiv>\n\n      <textarea class=\"sandbox-textarea\" id=\"s4-text\" spellcheck=\"false\">Edit this text and try different fonts. Notice how the same words feel different — serifs whisper, grotesques declare, monospace marches.<\u002Ftextarea>\n    <\u002Fdiv>\n\n    <div class=\"banner ok\">\n      <span class=\"lbl\">What just happened<\u002Fspan>\n      Clicking a preset injected a <span class=\"code-inline\">&lt;link&gt;<\u002Fspan> into this page's <span class=\"code-inline\">&lt;head&gt;<\u002Fspan>, waited for the font to arrive, then updated <span class=\"code-inline\">font-family<\u002Fspan>. Exactly the two steps from section 03.\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <footer class=\"footer\">\n    <span>DESN 368 · Web Design Fundamentals · Spring 2026<\u002Fspan>\n    <span>Module 04 — Typography<\u002Fspan>\n  <\u002Ffooter>\n\n<\u002Fmain>\n\n<script>\n/* ============================================================\n   WEIGHT PRIMER — interactive ladder\n   ============================================================ */\n(function() {\n  // Load Inter in all 9 weights so every rung renders at its true weight.\n  const link = document.createElement('link');\n  link.rel = 'stylesheet';\n  link.href = 'https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap';\n  document.head.appendChild(link);\n\n  const WEIGHTS = [\n    { w: 100, name: 'Thin' },\n    { w: 200, name: 'Extra-light' },\n    { w: 300, name: 'Light' },\n    { w: 400, name: 'Regular' },\n    { w: 500, name: 'Medium' },\n    { w: 600, name: 'Semi-bold' },\n    { w: 700, name: 'Bold' },\n    { w: 800, name: 'Extra-bold' },\n    { w: 900, name: 'Black' },\n  ];\n\n  const ladder = document.getElementById('primer-ladder');\n  const hint = document.getElementById('primer-hint');\n  let selected = 400;\n\n  function render() {\n    ladder.innerHTML = '';\n    WEIGHTS.forEach(({w, name}) => {\n      const rung = document.createElement('button');\n      rung.type = 'button';\n      rung.setAttribute('role', 'radio');\n      rung.setAttribute('aria-checked', String(w === selected));\n      rung.className = 'weight-rung' + (w === selected ? ' active' : '');\n      rung.style.cssText += 'background: transparent; border: 1px solid transparent; width: 100%;';\n      if (w === selected) rung.style.background = 'var(--eagle-red-subtle)';\n      rung.innerHTML = `\n        <span class=\"big\" style=\"font-weight: ${w};\">Aa<\u002Fspan>\n        <span class=\"num\">${w}<\u002Fspan>\n        <span class=\"name\">${name}<\u002Fspan>\n      `;\n      rung.addEventListener('click', () => { selected = w; render(); });\n      ladder.appendChild(rung);\n    });\n    const cur = WEIGHTS.find(x => x.w === selected);\n    hint.innerHTML = `Selected: <b>${cur.w} · ${cur.name}<\u002Fb> · <span class=\"code-inline\">font-weight: ${cur.w};<\u002Fspan>`;\n  }\n  render();\n})();\n\n/* ============================================================\n   SIZE PRIMER — pixel ladder\n   ============================================================ */\n(function() {\n  const SIZES = [\n    { px: 12, role: 'Meta' },\n    { px: 14, role: 'Caption' },\n    { px: 16, role: 'Body' },\n    { px: 18, role: 'Lead' },\n    { px: 22, role: 'H3' },\n    { px: 28, role: 'H2' },\n    { px: 36, role: 'H1' },\n    { px: 48, role: 'Hero' },\n    { px: 64, role: 'Display' },\n  ];\n\n  const ladder = document.getElementById('size-ladder');\n  const hint = document.getElementById('size-hint');\n  let selected = 16;\n\n  function render() {\n    ladder.innerHTML = '';\n    SIZES.forEach(({px, role}) => {\n      const rung = document.createElement('button');\n      rung.type = 'button';\n      rung.setAttribute('role', 'radio');\n      rung.setAttribute('aria-checked', String(px === selected));\n      rung.className = 'size-rung' + (px === selected ? ' active' : '');\n      rung.innerHTML = `\n        <span class=\"glyph\" style=\"font-size: ${px}px;\">Ag<\u002Fspan>\n        <span class=\"px\">${px}px<\u002Fspan>\n        <span class=\"role\">${role}<\u002Fspan>\n      `;\n      rung.addEventListener('click', () => { selected = px; render(); });\n      ladder.appendChild(rung);\n    });\n    const cur = SIZES.find(x => x.px === selected);\n    hint.innerHTML = `Selected: <b>${cur.px}px · ${cur.role}<\u002Fb> · <span class=\"code-inline\">font-size: ${cur.px}px;<\u002Fspan>`;\n  }\n  render();\n})();\n\n/* ============================================================\n   SECTION 1 — Font not found\n   ============================================================ */\n(function() {\n  // Preload Playfair Display so the \"on\" state really does render it.\n  const link = document.createElement('link');\n  link.rel = 'stylesheet';\n  link.href = 'https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&display=swap';\n  document.head.appendChild(link);\n\n  const toggle = document.getElementById('s1-toggle');\n  const text = document.getElementById('s1-text');\n  const resolved = document.getElementById('s1-resolved');\n  const cssBox = document.getElementById('s1-css');\n  const sub = document.getElementById('s1-sub');\n\n  const ON_HTML =\n`<span class=\"sel\">.headline<\u002Fspan> {\n  <span class=\"prop\">font-family<\u002Fspan>: <span class=\"str\">\"Playfair Display\"<\u002Fspan>;\n  <span class=\"prop\">font-weight<\u002Fspan>: <span class=\"str\">600<\u002Fspan>;\n}`;\n  const OFF_HTML =\n`<span class=\"sel\">.headline<\u002Fspan> {\n  <span class=\"prop\">font-family<\u002Fspan>: <span class=\"dropped\">\"Playfair Display\"<\u002Fspan>;  <span class=\"com\">/* not installed */<\u002Fspan>\n  <span class=\"prop\">font-weight<\u002Fspan>: <span class=\"str\">600<\u002Fspan>;\n}`;\n\n  function render() {\n    if (toggle.checked) {\n      // Simulate: strip the custom font; browser falls through to Georgia/serif\n      text.style.fontFamily = \"Georgia, serif\";\n      text.style.fontWeight = \"400\";\n      resolved.innerHTML = 'Rendering with: <b>Georgia<\u002Fb> (system fallback)';\n      cssBox.innerHTML = OFF_HTML;\n      sub.textContent = 'The font is missing. Browser reaches for a default.';\n    } else {\n      text.style.fontFamily = \"'Playfair Display', Georgia, serif\";\n      text.style.fontWeight = \"600\";\n      resolved.innerHTML = 'Rendering with: <b>Playfair Display<\u002Fb>';\n      cssBox.innerHTML = ON_HTML;\n      sub.textContent = 'The font is loaded.';\n    }\n  }\n  toggle.addEventListener('change', render);\n  render();\n})();\n\n/* ============================================================\n   SECTION 2 — Font stacking\n   ============================================================ */\n(function() {\n  // Load Inter for the first slot so students see a real custom font at step 0.\n  const link = document.createElement('link');\n  link.rel = 'stylesheet';\n  link.href = 'https://fonts.googleapis.com/css2?family=Inter:wght@500&display=swap';\n  document.head.appendChild(link);\n\n  const STACK = [\n    { name: 'Inter',            display: '\"Inter\"',            quoted: true,  kind: 'custom',  note: 'Custom webfont' },\n    { name: 'Helvetica Neue',   display: '\"Helvetica Neue\"',   quoted: true,  kind: 'system',  note: 'Mac-only' },\n    { name: 'Helvetica',        display: 'Helvetica',          quoted: false, kind: 'system',  note: 'Mac/iOS' },\n    { name: 'Arial',            display: 'Arial',              quoted: false, kind: 'system',  note: 'Windows-safe' },\n    { name: 'sans-serif',       display: 'sans-serif',         quoted: false, kind: 'generic', note: 'Generic family' },\n  ];\n  let dropped = new Set();\n\n  const textEl = document.getElementById('s2-text');\n  const resolvedEl = document.getElementById('s2-resolved');\n  const cssEl = document.getElementById('s2-css');\n  const chipsEl = document.getElementById('s2-chips');\n  const resetBtn = document.getElementById('s2-reset');\n\n  // Figure out which font the browser actually used (approximation via visible stack).\n  function firstAvailable() {\n    for (let i = 0; i < STACK.length; i++) {\n      if (!dropped.has(i)) return STACK[i];\n    }\n    return null;\n  }\n\n  function buildFontFamily() {\n    const active = STACK.filter((_, i) => !dropped.has(i));\n    if (active.length === 0) return 'serif';\n    return active.map(f => f.quoted ? `\"${f.name}\"` : f.name).join(', ');\n  }\n\n  function render() {\n    // Live text\n    const ff = buildFontFamily();\n    textEl.style.fontFamily = ff;\n    textEl.style.fontWeight = '500';\n\n    // Resolved label\n    const first = firstAvailable();\n    if (first) {\n      resolvedEl.innerHTML = `Rendering with: <b>${first.name}<\u002Fb> <span style=\"color: var(--fg3)\">· ${first.note}<\u002Fspan>`;\n    } else {\n      resolvedEl.innerHTML = `Rendering with: <b>—<\u002Fb>`;\n    }\n\n    // CSS view\n    const parts = STACK.map((f, i) => {\n      const tok = f.quoted ? `\"${f.name}\"` : f.name;\n      const cls = f.kind === 'generic' ? 'str' : 'str';\n      if (dropped.has(i)) return `<span class=\"dropped\">${tok}<\u002Fspan>`;\n      if (i === STACK.findIndex((_, j) => !dropped.has(j))) {\n        return `<span class=\"${cls} hl\">${tok}<\u002Fspan>`;\n      }\n      return `<span class=\"${cls}\">${tok}<\u002Fspan>`;\n    });\n    cssEl.innerHTML =\n`<span class=\"sel\">body<\u002Fspan> {\n  <span class=\"prop\">font-family<\u002Fspan>: ${parts.join(', ')};\n}`;\n\n    // Chips\n    chipsEl.innerHTML = '';\n    STACK.forEach((f, i) => {\n      if (i > 0) {\n        const sep = document.createElement('span');\n        sep.className = 'arrow-sep';\n        sep.textContent = '→';\n        chipsEl.appendChild(sep);\n      }\n      const chip = document.createElement('button');\n      chip.type = 'button';\n      const isDropped = dropped.has(i);\n      const isGeneric = f.kind === 'generic';\n      chip.className = 'stack-chip ' + (isGeneric ? 'generic' : (isDropped ? 'dropped' : 'active'));\n      chip.innerHTML = `<span>${f.display}<\u002Fspan>` + (isGeneric ? '' : `<span class=\"x\">${isDropped ? '↻' : '×'}<\u002Fspan>`);\n      if (isGeneric) {\n        chip.setAttribute('aria-disabled', 'true');\n      } else {\n        chip.addEventListener('click', () => {\n          if (dropped.has(i)) dropped.delete(i);\n          else dropped.add(i);\n          render();\n        });\n      }\n      chipsEl.appendChild(chip);\n    });\n  }\n\n  resetBtn.addEventListener('click', () => { dropped = new Set(); render(); });\n  render();\n})();\n\n/* ============================================================\n   SECTION 3 — Two-step walkthrough\n   ============================================================ */\n(function() {\n  let linkAdded = false;\n  let familySet = false;\n\n  const textEl = document.getElementById('s3-text');\n  const resolvedEl = document.getElementById('s3-resolved');\n  const linkSlot = document.getElementById('s3-link-slot');\n  const familySlot = document.getElementById('s3-family-slot');\n  const step1 = document.getElementById('s3-step1');\n  const step2 = document.getElementById('s3-step2');\n  const status = document.getElementById('s3-status');\n  const resetBtn = document.getElementById('s3-reset');\n\n  // We inject the actual Lora link when step 1 is pressed.\n  let loraLinkEl = null;\n  function addLoraLink() {\n    if (loraLinkEl) return;\n    loraLinkEl = document.createElement('link');\n    loraLinkEl.rel = 'stylesheet';\n    loraLinkEl.href = 'https://fonts.googleapis.com/css2?family=Lora:wght@500&display=swap';\n    document.head.appendChild(loraLinkEl);\n  }\n  function removeLoraLink() {\n    if (loraLinkEl) { loraLinkEl.remove(); loraLinkEl = null; }\n  }\n\n  function render() {\n    // HTML head slot\n    if (linkAdded) {\n      linkSlot.innerHTML = `<span class=\"placeholder-slot filled\" style=\"white-space: pre; font-family: var(--font-mono); font-size: 12px;\">&lt;link rel=\"stylesheet\" href=\"https://fonts.googleapis.com/css2?family=Lora:wght@500&display=swap\"&gt;<\u002Fspan>`;\n    } else {\n      linkSlot.innerHTML = `<span class=\"placeholder-slot\">empty &lt;link&gt; tag<\u002Fspan>`;\n    }\n    // CSS family slot\n    if (familySet) {\n      familySlot.innerHTML = `<span class=\"placeholder-slot filled\">\"Lora\", Georgia, serif<\u002Fspan>`;\n    } else {\n      familySlot.innerHTML = `<span class=\"placeholder-slot\">Georgia, serif<\u002Fspan>`;\n    }\n\n    // Apply preview font-family\n    if (familySet) {\n      textEl.style.fontFamily = \"'Lora', Georgia, serif\";\n      textEl.style.fontWeight = '500';\n    } else {\n      textEl.style.fontFamily = \"Georgia, serif\";\n      textEl.style.fontWeight = '400';\n    }\n\n    // Resolved label — this is the teaching moment\n    if (linkAdded && familySet) {\n      resolvedEl.innerHTML = `Rendering with: <b>Lora<\u002Fb> (from Google Fonts)`;\n      status.className = 'status-msg ok';\n      status.textContent = 'Both steps done — Lora is linked and referenced.';\n    } else if (linkAdded && !familySet) {\n      resolvedEl.innerHTML = `Rendering with: <b>Georgia<\u002Fb> (fallback — font loaded but not referenced)`;\n      status.className = 'status-msg warn';\n      status.textContent = 'Font loaded, but no CSS rule uses it. Nothing changes.';\n    } else if (!linkAdded && familySet) {\n      resolvedEl.innerHTML = `Rendering with: <b>Georgia<\u002Fb> (fallback — font named but not loaded)`;\n      status.className = 'status-msg warn';\n      status.textContent = 'CSS asks for Lora, but the browser has no copy — it falls back.';\n    } else {\n      resolvedEl.innerHTML = `Rendering with: <b>Georgia<\u002Fb> (fallback)`;\n      status.className = 'status-msg neutral';\n      status.textContent = 'Neither step done. The browser only has the fallback to work with.';\n    }\n\n    // Step rows\n    step1.classList.toggle('done', linkAdded);\n    step2.classList.toggle('done', familySet);\n    step1.querySelector('.step-btn').textContent = linkAdded ? 'Undo' : 'Add';\n    step2.querySelector('.step-btn').textContent = familySet ? 'Undo' : 'Add';\n\n    // Actual DOM link injection\n    if (linkAdded) addLoraLink(); else removeLoraLink();\n  }\n\n  document.querySelectorAll('#s3 .step-btn').forEach(btn => {\n    btn.addEventListener('click', () => {\n      const which = btn.getAttribute('data-step');\n      if (which === '1') linkAdded = !linkAdded;\n      else familySet = !familySet;\n      render();\n    });\n  });\n  resetBtn.addEventListener('click', () => { linkAdded = false; familySet = false; render(); });\n  render();\n})();\n\n/* ============================================================\n   SECTION 4 — Sandbox (real Google Fonts loading)\n   ============================================================ */\n(function() {\n  const PRESETS = [\n    { name: 'Space Grotesk',   weight: 500 },\n    { name: 'Fraunces',        weight: 500 },\n    { name: 'DM Serif Display',weight: 400 },\n    { name: 'JetBrains Mono',  weight: 500 },\n    { name: 'Bebas Neue',      weight: 400 },\n    { name: 'Caveat',          weight: 500 },\n  ];\n\n  const input = document.getElementById('s4-input');\n  const loadBtn = document.getElementById('s4-load');\n  const presetsEl = document.getElementById('s4-presets');\n  const cssEl = document.getElementById('s4-css');\n  const textEl = document.getElementById('s4-text');\n  const indicator = document.getElementById('s4-loadstatus');\n\n  let currentFont = null;\n  const loadedFonts = new Set();\n\n  function fontUrl(name, weight) {\n    const famEnc = name.trim().replace(/\\s+/g, '+');\n    return `https://fonts.googleapis.com/css2?family=${famEnc}:wght@${weight}&display=swap`;\n  }\n\n  function renderCSS(fontName, fallback) {\n    const quoted = fontName ? `\"${fontName}\"` : '';\n    const fam = fontName ? `${quoted}, ${fallback}` : fallback;\n    cssEl.innerHTML =\n`<span class=\"com\">/* index.html */<\u002Fspan>\n&lt;<span class=\"tag\">link<\u002Fspan> <span class=\"attr\">rel<\u002Fspan>=<span class=\"str\">\"stylesheet\"<\u002Fspan>\n      <span class=\"attr\">href<\u002Fspan>=<span class=\"str\">\"${fontName ? `https://fonts.googleapis.com/css2?family=${fontName.replace(/\\s+/g,'+')}:wght@500&display=swap` : '…'}\"<\u002Fspan>&gt;\n\n<span class=\"com\">/* styles.css */<\u002Fspan>\n<span class=\"sel\">.demo<\u002Fspan> {\n  <span class=\"prop\">font-family<\u002Fspan>: <span class=\"str\">${fam}<\u002Fspan>;\n}`;\n  }\n\n  function setIndicator(state, msg) {\n    indicator.className = 'load-indicator ' + state;\n    indicator.querySelector('.msg').textContent = msg;\n  }\n\n  function setActiveChip(name) {\n    presetsEl.querySelectorAll('.preset-chip').forEach(c => {\n      c.classList.toggle('active', c.dataset.name === name);\n    });\n  }\n\n  function guessFallback(name) {\n    const lower = name.toLowerCase();\n    if (/mono|code|consol|courier/.test(lower)) return \"ui-monospace, 'Courier New', monospace\";\n    if (/serif|fraunces|lora|playfair|merriweather|garamond/.test(lower)) return \"Georgia, 'Times New Roman', serif\";\n    return \"-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif\";\n  }\n\n  async function applyFont(name, weight) {\n    name = (name || '').trim();\n    if (!name) return;\n    const fallback = guessFallback(name);\n    setIndicator('loading', `Loading \"${name}\"…`);\n\n    // Inject link\n    if (!loadedFonts.has(name)) {\n      const link = document.createElement('link');\n      link.rel = 'stylesheet';\n      link.href = fontUrl(name, weight || 500);\n      link.setAttribute('data-google-font', name);\n      document.head.appendChild(link);\n      loadedFonts.add(name);\n\n      link.addEventListener('error', () => {\n        setIndicator('err', `Could not load \"${name}\".`);\n      });\n    }\n\n    // Apply font-family (browser falls back until font arrives)\n    currentFont = name;\n    textEl.style.fontFamily = `\"${name}\", ${fallback}`;\n    renderCSS(name, fallback);\n    setActiveChip(name);\n\n    // Wait for the font to be ready\n    if (document.fonts && document.fonts.load) {\n      try {\n        await document.fonts.load(`${weight || 500} 20px \"${name}\"`);\n        // Check it actually became available\n        if (document.fonts.check(`${weight || 500} 20px \"${name}\"`)) {\n          setIndicator('ok', `\"${name}\" loaded and applied.`);\n        } else {\n          setIndicator('err', `\"${name}\" didn't load — check spelling. Showing fallback.`);\n        }\n      } catch (e) {\n        setIndicator('err', `Could not load \"${name}\".`);\n      }\n    } else {\n      setIndicator('ok', `\"${name}\" applied.`);\n    }\n  }\n\n  // Build preset chips\n  PRESETS.forEach(p => {\n    const btn = document.createElement('button');\n    btn.type = 'button';\n    btn.className = 'preset-chip';\n    btn.dataset.name = p.name;\n    btn.textContent = p.name;\n    btn.style.fontFamily = `\"${p.name}\", ${guessFallback(p.name)}`;\n    // Preload each preset's font so the chip itself renders in its typeface\n    const link = document.createElement('link');\n    link.rel = 'stylesheet';\n    link.href = fontUrl(p.name, p.weight);\n    document.head.appendChild(link);\n    loadedFonts.add(p.name);\n\n    btn.addEventListener('click', () => applyFont(p.name, p.weight));\n    presetsEl.appendChild(btn);\n  });\n\n  loadBtn.addEventListener('click', () => applyFont(input.value, 500));\n  input.addEventListener('keydown', (e) => {\n    if (e.key === 'Enter') { e.preventDefault(); applyFont(input.value, 500); }\n  });\n\n  // Initial state — no custom font yet\n  renderCSS(null, \"-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif\");\n  setIndicator('', 'Idle. Pick a preset or type a font name.');\n\n  // Auto-load the first preset so the page opens showing something interesting\n  setTimeout(() => applyFont('Space Grotesk', 500), 200);\n})();\n\n/* ============================================================\n   Smooth scroll for step nav\n   ============================================================ */\ndocument.querySelectorAll('.stepnav a').forEach(a => {\n  a.addEventListener('click', (e) => {\n    const id = a.getAttribute('href');\n    if (id && id.startsWith('#')) {\n      const el = document.querySelector(id);\n      if (el) {\n        e.preventDefault();\n        window.scrollTo({ top: el.getBoundingClientRect().top + window.scrollY - 16, behavior: 'smooth' });\n      }\n    }\n  });\n});\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
