<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Theme Toggle Basic</title>

  <!-- ===========================================
       DEMO: Basic Theme Toggle
       Week 3 — Signal & State

       What this demonstrates:
       - CSS variables (design tokens)
       - classList.toggle for simple state
       - CSS responding to class changes

       CodePen: Copy CSS to CSS panel, JS to JS panel,
       body content to HTML panel
       =========================================== -->

  <style>
    /* -----------------------------------------
       DESIGN TOKENS
       These are your design decisions in one place
       ----------------------------------------- */
    :root {
      --color-surface: #ffffff;
      --color-text: #1a1a1a;
      --color-accent: #0066cc;
      --color-border: #e0e0e0;

      --font-family: system-ui, -apple-system, sans-serif;
      --transition-speed: 0.3s;
    }

    /* -----------------------------------------
       DARK MODE OVERRIDE
       When body has class "dark", these override
       ----------------------------------------- */
    body.dark {
      --color-surface: #1a1a1a;
      --color-text: #f0f0f0;
      --color-accent: #66b3ff;
      --color-border: #333333;
    }

    /* -----------------------------------------
       BASE STYLES
       All styles use tokens, not hardcoded values
       ----------------------------------------- */
    * {
      box-sizing: border-box;
    }

    body {
      background-color: var(--color-surface);
      color: var(--color-text);
      font-family: var(--font-family);
      margin: 0;
      padding: 2rem;
      min-height: 100vh;
      transition:
        background-color var(--transition-speed) ease,
        color var(--transition-speed) ease;
    }

    h1 {
      margin-top: 0;
    }

    /* -----------------------------------------
       TOGGLE BUTTON
       ----------------------------------------- */
    .theme-toggle {
      background: var(--color-accent);
      color: var(--color-surface);
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 4px;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .theme-toggle:hover {
      transform: scale(1.05);
    }

    .theme-toggle:focus {
      outline: 2px solid var(--color-accent);
      outline-offset: 2px;
    }

    /* -----------------------------------------
       SAMPLE CONTENT
       Shows tokens in use
       ----------------------------------------- */
    .card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 8px;
      padding: 1.5rem;
      margin-top: 2rem;
      max-width: 400px;
    }

    .card p {
      margin: 0;
      line-height: 1.6;
    }

    a {
      color: var(--color-accent);
    }
  </style>
</head>
<body>
  <h1>Theme Toggle Demo</h1>

  <button class="theme-toggle">Toggle Theme</button>

  <div class="card">
    <p>
      This is sample content. Watch how the colors change when you
      click the button. All styles use <a href="#">CSS variables</a>,
      so one change updates everything.
    </p>
  </div>

  <script>
    /* -----------------------------------------
       JAVASCRIPT
       Find, Listen, Change
       ----------------------------------------- */

    // Step 1: Find the button
    const toggle = document.querySelector('.theme-toggle');

    // Step 2: Listen for clicks
    toggle.addEventListener('click', function() {
      // Step 3: Toggle the dark class on body
      document.body.classList.toggle('dark');
    });
  </script>
</body>
</html>
